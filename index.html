<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>GEOMETRI SYSTEM</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: sans-serif; overflow: hidden; }
        #login { height: 100%; display: flex; justify-content: center; align-items: center; flex-direction: column; color: #0f0; }
        .nav { display: none; background: #111; border-bottom: 2px solid #0f0; overflow-x: auto; white-space: nowrap; }
        .tab-btn { display: inline-block; padding: 15px 25px; color: #0f0; cursor: pointer; border-right: 1px solid #333; font-weight: bold; }
        .tab-btn.active { background: #0f0; color: #000; }
        iframe { width: 100%; height: calc(100vh - 50px); border: none; display: none; background: #fff; }
        iframe.active { display: block; }
        .login-input { background: #000; border: 1px solid #0f0; color: #0f0; padding: 10px; margin: 10px; text-align: center; }
    </style>
</head>
<body>
    <div id="login">
        <h1>GEOMETRI</h1>
        <input type="password" id="p" class="login-input" placeholder="KOD">
        <button onclick="check()" style="padding: 10px 20px; background: #0f0; border: none; cursor: pointer;">ENTER</button>
    </div>

    <div id="app" style="display:none; height: 100%;">
        <div class="nav" id="nav"></div>
        <div id="views" style="height: 100%;"></div>
    </div>

    <script>
        const data = [{"name":"Measurement Tool","content":"<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>V436 Ultimate Inspection Tool</title>\n\n<!-- XLSX for Excel export -->\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js\"><\/script>\n\n<style>\n    :root {\n        --brand: #0f172a;\n        --accent: #3b82f6;\n        --success: #16a34a;\n    }\n    body {\n        font-family: Arial, sans-serif;\n        background: #f8fafc;\n        padding: 20px;\n    }\n    .container {\n        background: white;\n        padding: 30px;\n        border-radius: 12px;\n        box-shadow: 0 8px 30px rgba(0,0,0,0.12);\n        max-width: 1400px;\n        margin: auto;\n    }\n    header {\n        display: flex; justify-content: space-between; align-items: center;\n        padding-bottom: 15px; margin-bottom: 20px;\n        border-bottom: 2px solid #e2e8f0;\n    }\n    .btn {\n        padding: 10px 20px; border-radius: 6px;\n        border: none; color: white; cursor: pointer;\n        font-weight: 600;\n    }\n    .btn-add { background: var(--accent); }\n    .btn-excel { background: var(--success); }\n    .btn-pdf { background: #555; }\n\n    table {\n        width: 100%; border-collapse: collapse;\n        margin-top: 15px; font-size: 13px;\n    }\n    th {\n        background: var(--brand); color: white;\n        padding: 10px; position: sticky; top: 0;\n    }\n    td {\n        padding: 8px; border-bottom: 1px solid #e2e8f0;\n    }\n    tr:hover { background: #f1f5f9; }\n\n    .input-measure {\n        width: 90px; padding: 6px;\n        border-radius: 6px; border: 1px solid #cbd5e1;\n        text-align: center;\n    }\n\n    .status-pill {\n        padding: 4px 12px; border-radius: 10px; font-weight: bold;\n    }\n    .pass { background: #dcfce7; color: #166534; }\n    .fail { background: #fee2e2; color: #991b1b; }\n    .pending { background: #f1f5f9; color: #64748b; }\n\n    .manual-box {\n        background: #f1f5f9; padding: 15px;\n        border-radius: 10px; margin-bottom: 20px;\n    }\n    .manual-box input {\n        padding: 7px; margin-right: 10px;\n        margin-bottom: 6px;\n        border-radius: 6px;\n        border: 1px solid #cbd5e1;\n    }\n\n    .icon-btn {\n        background: white;\n        border: 1px solid #cbd5e1;\n        padding: 2px 6px;\n        border-radius: 4px;\n        cursor: pointer;\n        font-size: 12px;\n    }\n    .icon-btn:hover {\n        background: #e2e8f0;\n    }\n\n    .car-id-input {\n        padding: 5px;\n        border: 1px solid #cbd5e1;\n        border-radius: 5px;\n        width: 80px;\n    }\n\n    @media print {\n        .no-print { display: none; }\n        body { padding: 0; }\n        .container { box-shadow: none; }\n    }\n</style>\n\n</head>\n<body>\n\n<div class=\"container\">\n\n<header>\n    <div>\n        <h1 style=\"margin:0\">Asebraoui CM4D Tool</h1>\n        <p id=\"subtitle\" style=\"margin:5px 0;color:#64748b\">Geometry Analyse Support</p>\n    </div>\n\n    <div class=\"no-print\">\n        <label><strong>CAR ID:</strong></label>\n        <input id=\"carID\" type=\"text\" placeholder=\"Optional\" style=\"padding:6px;\">\n    </div>\n</header>\n\n<!-- Manual Add Section -->\n<div class=\"manual-box no-print\">\n    <h3>Add Custom Measurement</h3>\n\n    <input id=\"m_id\" placeholder=\"Feature ID\">\n    <input id=\"m_side\" placeholder=\"Side (LH/RH)\">\n    <input id=\"m_type\" placeholder=\"Type\">\n    <input id=\"m_nom\" placeholder=\"Nominal\" type=\"number\" step=\"0.01\">\n    <input id=\"m_tol\" placeholder=\"Tolerance\" type=\"number\" step=\"0.01\">\n    <input id=\"m_lsl\" placeholder=\"LSL (optional)\" type=\"number\" step=\"0.01\">\n    <input id=\"m_usl\" placeholder=\"USL (optional)\" type=\"number\" step=\"0.01\">\n\n    <button class=\"btn btn-add\" onclick=\"addManualRow()\">Add</button>\n</div>\n\n<div class=\"toolbar no-print\" style=\"display:flex; gap:10px; margin-bottom:15px;\">\n    <input id=\"search\" class=\"search-input\" placeholder=\"Search...\" \n           onkeyup=\"doSearch()\" \n           style=\"flex:1; padding:10px; border-radius:6px; border:1px solid #cbd5e1;\">\n    <button class=\"btn btn-excel\" onclick=\"saveExcel()\">Excel</button>\n    <button class=\"btn btn-pdf\" onclick=\"window.print()\">PDF</button>\n</div>\n\n<table id=\"mainTable\">\n<thead>\n    <tr>\n        <th>CAR ID</th>\n        <th>Feature ID</th>\n        <th>Side</th>\n        <th>Type</th>\n        <th>Nominal</th>\n        <th>TOL (±)</th>\n        <th>LSL</th>\n        <th>USL</th>\n        <th>Measured</th>\n        <th>Result</th>\n        <th class=\"no-print\">Actions</th>\n    </tr>\n</thead>\n\n<tbody id=\"tableBody\"></tbody>\n</table>\n\n</div>\n\n<script>\n\n// ENTER KEY HANDLING\ndocument.addEventListener(\"keydown\", e => {\n\n    if (document.activeElement.classList.contains(\"car-id-input\")) return;\n\n    if (e.key === \"Enter\" && document.activeElement.classList.contains(\"input-measure\")) {\n        e.preventDefault();\n\n        let inp = document.activeElement;\n        let savedValue = inp.value;\n        inp.setAttribute(\"value\", savedValue);\n\n        let row = inp.closest(\"tr\");\n        let next = row.nextElementSibling;\n\n        if (!next) {\n            let tbody = document.getElementById(\"tableBody\");\n            let newRow = row.cloneNode(true);\n\n            newRow.querySelector(\".input-measure\").value = \"\";\n            newRow.querySelector(\".status-pill\").className = \"status-pill pending\";\n            newRow.querySelector(\".status-pill\").innerText = \"Pending\";\n\n            tbody.appendChild(newRow);\n            next = newRow;\n        }\n\n        let nextInput = next.querySelector(\".input-measure\");\n        if (nextInput) nextInput.focus();\n    }\n});\n\n// ADD CUSTOM ROW\nfunction addManualRow() {\n\n    let car = carID.value || \"-\";\n    let id = m_id.value || \"-\";\n    let side = m_side.value || \"-\";\n    let type = m_type.value || \"Custom\";\n\n    let nom = parseFloat(m_nom.value) || 0;\n    let tol = parseFloat(m_tol.value);\n\n    let lsl = parseFloat(m_lsl.value);\n    let usl = parseFloat(m_usl.value);\n\n    if (isNaN(lsl) || isNaN(usl)) {\n        if (!isNaN(tol)) {\n            lsl = nom - tol;\n            usl = nom + tol;\n        } else {\n            lsl = nom;\n            usl = nom;\n        }\n    }\n\n    let tolText = isNaN(tol) ? \"±0.00\" : `±${tol.toFixed(2)}`;\n\n    const tbody = document.getElementById(\"tableBody\");\n    const tr = document.createElement(\"tr\");\n\n    tr.innerHTML = `\n        <td>\n            <span class=\"car-id-text\"><strong>${car}</strong></span>\n            <button class=\"icon-btn\" onclick=\"editCarId(this)\">✎</button>\n        </td>\n        <td><strong>${id}</strong></td>\n        <td>${side}</td>\n        <td>${type}</td>\n        <td>${nom.toFixed(2)}</td>\n        <td style=\"color:purple;\">${tolText}</td>\n        <td style=\"color:blue;\">${lsl.toFixed(2)}</td>\n        <td style=\"color:red;\">${usl.toFixed(2)}</td>\n        <td>\n            <input type=\"number\" class=\"input-measure\" step=\"0.01\"\n                oninput=\"validate(this, ${lsl}, ${usl})\">\n        </td>\n        <td><span class=\"status-pill pending\">Pending</span></td>\n        <td class=\"no-print\">\n            <button class=\"icon-btn\" onclick=\"duplicateRow(this)\">⎘</button>\n        </td>\n    `;\n\n    tbody.appendChild(tr);\n\n    m_id.value = \"\";\n    m_side.value = \"\";\n    m_type.value = \"\";\n    m_nom.value = \"\";\n    m_tol.value = \"\";\n    m_lsl.value = \"\";\n    m_usl.value = \"\";\n}\n\n// EDIT CAR ID\nfunction editCarId(btn) {\n    const td = btn.closest(\"td\");\n    const span = td.querySelector(\".car-id-text\");\n\n    let input = td.querySelector(\".car-id-input\");\n    if (!input) {\n        input = document.createElement(\"input\");\n        input.className = \"car-id-input\";\n        td.insertBefore(input, btn);\n\n        input.addEventListener(\"keydown\", e => {\n            if (e.key === \"Enter\") saveCarId(input, span);\n            e.stopPropagation();\n        });\n        input.addEventListener(\"blur\", () => saveCarId(input, span));\n    }\n\n    input.value = span.textContent.trim();\n    span.style.display = \"none\";\n    input.style.display = \"inline-block\";\n    input.focus();\n    input.select();\n}\n\nfunction saveCarId(input, span) {\n    let newVal = input.value.trim() || \"-\";\n    span.textContent = newVal;\n    span.style.display = \"inline\";\n    input.style.display = \"none\";\n}\n\n// DUPLICATE ROW\nfunction duplicateRow(btn) {\n    const row = btn.closest(\"tr\");\n    const clone = row.cloneNode(true);\n\n    clone.querySelector(\".input-measure\").value = \"\";\n    const pill = clone.querySelector(\".status-pill\");\n    pill.className = \"status-pill pending\";\n    pill.textContent = \"Pending\";\n\n    row.parentNode.insertBefore(clone, row.nextSibling);\n}\n\n// VALIDATION\nfunction validate(inp, low, high) {\n    const v = parseFloat(inp.value);\n    const pill = inp.closest(\"tr\").querySelector(\".status-pill\");\n\n    if (!inp.value) {\n        pill.className = \"status-pill pending\";\n        pill.innerText = \"Pending\";\n    } else if (v >= low && v <= high) {\n        pill.className = \"status-pill pass\";\n        pill.innerText = \"Pass\";\n    } else {\n        pill.className = \"status-pill fail\";\n        pill.innerText = \"Fail\";\n    }\n}\n\n// SEARCH\nfunction doSearch() {\n    let q = search.value.toLowerCase();\n    document.querySelectorAll(\"#tableBody tr\").forEach(r => {\n        r.style.display = r.innerText.toLowerCase().includes(q) ? \"\" : \"none\";\n    });\n}\n\n// EXCEL EXPORT\nfunction saveExcel() {\n    const wb = XLSX.utils.table_to_book(document.getElementById(\"mainTable\"));\n    XLSX.writeFile(wb, `V436_${new Date().toISOString().slice(0,10)}.xlsx`);\n}\n\n<\/script>\n\n</body>\n</html>"},{"name":"CM4D Tool Insert","content":"<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>V436 Advanced Inspection Tool</title>\n\n<!-- Libraries -->\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js\"><\/script>\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js\"><\/script>\n\n<style>\n:root {\n    --brand:#0f172a; --accent:#3b82f6;\n    --success:#16a34a; --danger:#dc2626; --bg:#f8fafc;\n}\nbody {\n    font-family: Inter, sans-serif;\n    background:var(--bg); margin:0; padding:20px; color:#334155;\n}\n.container {\n    max-width:1400px; margin:auto; background:white;\n    padding:30px; border-radius:12px;\n    box-shadow:0 10px 15px -3px rgba(0,0,0,.1);\n}\nheader {\n    display:flex; justify-content:space-between; align-items:center;\n    border-bottom:2px solid #e2e8f0; padding-bottom:20px; margin-bottom:20px;\n}\n.upload-zone {\n    background:#f1f5f9; border:2px dashed #cbd5e1;\n    padding:25px; text-align:center; border-radius:8px;\n    margin-bottom:20px; cursor:pointer;\n}\n.upload-zone:hover { border-color:var(--accent); background:#eff6ff; }\n.toolbar { display:flex; gap:10px; margin-bottom:20px; }\n.search-input {\n    flex-grow:1; padding:12px; border:1px solid #cbd5e1;\n    border-radius:6px; font-size:14px;\n}\n.btn {\n    padding:10px 20px; border:none; border-radius:6px;\n    cursor:pointer; font-weight:bold; color:white;\n}\n.btn-excel{background:var(--success)}\n.btn-pdf{background:#64748b}\n\ntable { width:100%; border-collapse:collapse; font-size:13px; }\nth {\n    background:var(--brand); color:white; padding:12px;\n    position:sticky; top:0; text-align:left;\n}\ntd { padding:8px 12px; border-bottom:1px solid #e2e8f0; }\ntr:hover { background:#f8fafc; }\n\n.input-measure {\n    width:95px; padding:6px;\n    border:1px solid #cbd5e1;\n    border-radius:4px;\n    text-align:center;\n    font-weight:bold;\n}\n.input-measure::placeholder {\n    color:#94a3b8;\n    font-weight:normal;\n}\n\n.status-pill {\n    padding:4px 10px; border-radius:12px;\n    font-size:11px; font-weight:bold;\n    display:inline-block; min-width:60px; text-align:center;\n}\n.OK{background:#dcfce7;color:#166534}\n.NOK{background:#fee2e2;color:#991b1b}\n.pending{background:#f1f5f9;color:#64748b}\n</style>\n</head>\n\n<div class=\"container\">\n\n<header>\n<div>\n    <h1 style=\"margin:0\">Asebraoui CM4D Tool</h1>\n    <p id=\"subtitle\" style=\"margin:5px 0;color:#64748b\">\n        Geometry Analyse Support\n    </p>\n    <p id=\"routineInfo\" style=\"margin:2px 0;color:#475569;font-weight:bold\"></p>\n</div>\n<div style=\"text-align:right\">\n    <div id=\"stats\" style=\"font-weight:bold\">0 / 0 Completed</div>\n    <small id=\"curDate\"></small>\n</div>\n</header>\n\n<div>\n<div class=\"upload-zone\" onclick=\"fileInput.click()\">\n    <strong>Click to select file</strong> or drag here\n    <input id=\"fileInput\" type=\"file\" accept=\".csv\" hidden>\n</div>\n\n<div class=\"toolbar\">\n    <input id=\"search\" class=\"search-input\"\n           placeholder=\"Search Feature, Tool, Side, Type...\"\n           onkeyup=\"doSearch()\">\n    <button class=\"btn btn-excel\" onclick=\"saveExcel()\">Excel</button>\n    <button class=\"btn btn-pdf\" onclick=\"window.print()\">PDF</button>\n</div>\n</div>\n\n<table id=\"mainTable\">\n<thead>\n<tr>\n    <th>Feature ID</th>\n    <th>TOOL NO.</th>\n    <th>Side</th>\n    <th>Type</th>\n    <th>Nominal</th>\n    <th>TOL</th>\n    <th>Measured</th>\n    <th>Result</th>\n</tr>\n</thead>\n<tbody id=\"tableBody\"></tbody>\n</table>\n\n</div>\n\n<script>\ncurDate.innerText = new Date().toLocaleString();\n\nfileInput.addEventListener(\"change\", e => {\n    Papa.parse(e.target.files[0], {\n        skipEmptyLines:true,\n        complete: res => buildTable(res.data, e.target.files[0].name)\n    });\n});\n\nfunction normalize(v){\n    return String(v || \"\").trim().toLowerCase();\n}\n\nfunction handleEnter(e, input) {\n    if (e.key === \"Enter\") {\n        e.preventDefault();\n        const inputs = [...document.querySelectorAll(\".input-measure\")];\n        const idx = inputs.indexOf(input);\n        if (idx > -1 && idx < inputs.length - 1) {\n            inputs[idx + 1].focus();\n            inputs[idx + 1].select();\n        }\n    }\n}\n\nfunction buildTable(rows, name){\n    tableBody.innerHTML = \"\";\n\n    const hIdx = rows.findIndex(r =>\n        r.some(c => normalize(c) === \"feature\")\n    );\n    if (hIdx < 0) return alert(\"Header row not found\");\n\n    const h = rows[hIdx];\n    const idx = n => h.findIndex(c => normalize(c) === normalize(n));\n\n    const c = {\n        id: idx(\"Feature\"),\n        tool: idx(\"GAUGE TYPE\"),\n        hand: idx(\"SMI Hand\"),\n        type: idx(\"SMI Type\"),\n        routine:idx(\"Routine\"),\n        gNom: idx(\"Gap\"),\n        gUp: idx(\"Upper Gap\"),\n        fNom: idx(\"Flush\"),\n        fUp: idx(\"Upper Flush\"),\n        stdNom: idx(\"NOM\"),\n        stdTol: idx(\"TOL\")\n    };\n  /* === FIND ROUTINE TEXT ANYWHERE IN CSV === */\nlet routineValue = \"-\";\n\nrows.some(row => {\n    return row.some(cell => {\n        if (typeof cell === \"string\" && cell.includes(\"Routine:\")) {\n            const match = cell.match(/Routine:\\s*(.*?)\\s*No Subroutine/i);\n            if (match && match[1]) {\n                routineValue = match[1].trim();\n                return true;\n            }\n        }\n        return false;\n    });\n});\n\nroutineInfo.innerText = `Routine: ${routineValue}`;\n\n\n    let count = 0;\n\n    rows.slice(hIdx + 1).forEach(r => {\n        const id = String(r[c.id] || \"\").trim();\n        if (!id || id.toUpperCase().includes(\"VAR\")) return;\n\n        let nom = 0, tol = 0, type = r[c.type] || \"-\";\n\n        if (r[c.gNom] && r[c.gUp]) {\n            nom = +r[c.gNom];\n            tol = Math.abs(+r[c.gUp]);\n            type = \"Gap\";\n        } else if (r[c.fNom] && r[c.fUp]) {\n            nom = +r[c.fNom];\n            tol = Math.abs(+r[c.fUp]);\n            type = \"Flush\";\n        } else if (c.stdNom >= 0) {\n            nom = +r[c.stdNom];\n            tol = Math.abs(String(r[c.stdTol] || \"0\").replace(\"±\",\"\"));\n        }\n\n        const lsl = nom - tol;\n        const usl = nom + tol;\n\n        tableBody.insertAdjacentHTML(\"beforeend\", `\n        <tr>\n            <td><b>${id}</b></td>\n            <td>${r[c.tool] || \"-\"}</td>\n            <td>${r[c.hand] || \"-\"}</td>\n            <td style=\"color:#64748b\">${type}</td>\n            <td>${nom.toFixed(2)}</td>\n            <td><b>±${tol.toFixed(2)}</b></td>\n            <td>\n                <input class=\"input-measure\"\n                       type=\"number\"\n                       step=\"0.01\"\n                       min=\"${lsl.toFixed(2)}\"\n                       max=\"${usl.toFixed(2)}\"\n                       placeholder=\"${lsl.toFixed(2)} – ${usl.toFixed(2)}\"\n                       title=\"Allowed range: ${lsl.toFixed(2)} to ${usl.toFixed(2)}\"\n                       oninput=\"validate(this,${lsl},${usl})\"\n                       onkeydown=\"handleEnter(event, this)\">\n            </td>\n            <td><span class=\"status-pill pending\">Pending</span></td>\n        </tr>`);\n        count++;\n    });\n\n    fileInfo.innerText = `File: ${name} (${count} Points)`;\n    updateStats();\n}\n\nfunction validate(inp, lsl, usl){\n    const v = +inp.value;\n    const pill = inp.closest(\"tr\").querySelector(\".status-pill\");\n\n    if (!inp.value) {\n        pill.className = \"status-pill pending\";\n        pill.innerText = \"Pending\";\n    } else if (v >= lsl && v <= usl) {\n        pill.className = \"status-pill OK\";\n        pill.innerText = \"OK\";\n    } else {\n        pill.className = \"status-pill NOK\";\n        pill.innerText = \"NOK\";\n    }\n    updateStats();\n}\n\nfunction updateStats(){\n    const inputs = [...document.querySelectorAll(\".input-measure\")];\n    stats.innerText = `${inputs.filter(i => i.value).length} / ${inputs.length} Completed`;\n}\n\nfunction saveExcel(){\n    const wb = XLSX.utils.book_new();\n    const ws = XLSX.utils.table_to_sheet(mainTable);\n    XLSX.utils.book_append_sheet(wb, ws, \"Inspection\");\n    XLSX.writeFile(\n        wb,\n        `V436_Inspection_${new Date().toISOString().replace(/[:.]/g,\"-\")}.xlsx`\n    );\n}\n\nfunction doSearch() {\n  // Read and normalize the search box\n  const raw = search.value.toLowerCase().trim();\n\n  // Split by any whitespace; ignore empty chunks\n  const terms = raw.split(/\\s+/).filter(Boolean);\n\n  // If nothing typed -> show everything\n  if (terms.length === 0) {\n    [...tableBody.rows].forEach(r => r.style.display = \"\");\n    return;\n  }\n\n  // Show a row if ANY term matches (OR logic)\n  [...tableBody.rows].forEach(row => {\n    const text = row.innerText.toLowerCase();\n    const matchesAny = terms.some(t => text.includes(t));\n    row.style.display = matchesAny ? \"\" : \"none\";\n  });\n}\n<\/script>\n\n</body>\n</html>\n"},{"name":"Shims Uträknare","content":"<!DOCTYPE html>\n<html lang=\"sv\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no\">\n    <meta http-equiv=\"X-UA-Compatible\" content=\"ie=edge\">\n    <title>Geometri Analys Support</title>\n    \n    <!-- Externa bibliotek för UI och logik -->\n    <script crossorigin src=\"https://unpkg.com/react@18/umd/react.production.min.js\"><\/script>\n    <script crossorigin src=\"https://unpkg.com/react-dom@18/umd/react-dom.production.min.js\"><\/script>\n    <script src=\"https://unpkg.com/@babel/standalone/babel.min.js\"><\/script>\n    <script src=\"https://cdn.tailwindcss.com\"><\/script>\n    \n    <!-- Firebase SDK (förberedd för molnlagring) -->\n    <script type=\"module\">\n        import { initializeApp } from \"https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js\";\n        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, serverTimestamp, query, orderBy } from \"https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js\";\n        import { getAuth, signInAnonymously } from \"https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js\";\n\n        // Klistra in din Firebase Config här för att spara i molnet\n        const firebaseConfig = {\n            apiKey: \"\",\n            authDomain: \"\",\n            projectId: \"\",\n            storageBucket: \"\",\n            messagingSenderId: \"\",\n            appId: \"\"\n        };\n\n        let db = null;\n        if (firebaseConfig.apiKey) {\n            try {\n                const app = initializeApp(firebaseConfig);\n                db = getFirestore(app);\n                const auth = getAuth(app);\n                signInAnonymously(auth);\n            } catch (e) {\n                console.error(\"Firebase misslyckades:\", e);\n            }\n        }\n\n        window.fs = { db, collection, addDoc, onSnapshot, deleteDoc, doc, serverTimestamp, query, orderBy };\n    <\/script>\n\n    <style>\n        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');\n        body { \n            font-family: 'Inter', sans-serif; \n            -webkit-tap-highlight-color: transparent;\n            touch-action: manipulation;\n        }\n        input[type=\"number\"] { font-size: 16px; } /* Förhindrar automatisk zoom på iPhone */\n        \n        .log-card {\n            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);\n        }\n        .log-card:active {\n            transform: scale(0.98);\n        }\n    </style>\n</head>\n<body class=\"bg-slate-50 text-slate-900\">\n    <div id=\"root\"></div>\n\n    <script type=\"text/babel\">\n        const { useState, useEffect, useMemo } = React;\n\n        const Icons = {\n            Ruler: () => <svg className=\"w-6 h-6\" fill=\"none\" stroke=\"currentColor\" viewBox=\"0 0 24 24\"><path strokeLinecap=\"round\" strokeLinejoin=\"round\" strokeWidth=\"2\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01\" /></svg>,\n            Trash: () => <svg className=\"w-5 h-5\" fill=\"none\" stroke=\"currentColor\" viewBox=\"0 0 24 24\"><path strokeLinecap=\"round\" strokeLinejoin=\"round\" strokeWidth=\"2\" d=\"M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16\" /></svg>,\n            Save: () => <svg className=\"w-5 h-5\" fill=\"none\" stroke=\"currentColor\" viewBox=\"0 0 24 24\"><path strokeLinecap=\"round\" strokeLinejoin=\"round\" strokeWidth=\"2\" d=\"M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4\" /></svg>,\n            ChevronDown: () => <svg className=\"w-4 h-4\" fill=\"none\" stroke=\"currentColor\" viewBox=\"0 0 24 24\"><path strokeLinecap=\"round\" strokeLinejoin=\"round\" strokeWidth=\"2\" d=\"M19 9l-7 7-7-7\" /></svg>,\n            ChevronUp: () => <svg className=\"w-4 h-4\" fill=\"none\" stroke=\"currentColor\" viewBox=\"0 0 24 24\"><path strokeLinecap=\"round\" strokeLinejoin=\"round\" strokeWidth=\"2\" d=\"M5 15l7-7 7 7\" /></svg>,\n            Download: () => <svg className=\"w-4 h-4\" fill=\"none\" stroke=\"currentColor\" viewBox=\"0 0 24 24\"><path strokeLinecap=\"round\" strokeLinejoin=\"round\" strokeWidth=\"2\" d=\"M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4\" /></svg>\n        };\n\n        function App() {\n            const [logs, setLogs] = useState([]);\n            const [expandedIds, setExpandedIds] = useState(new Set());\n            const [machineId, setMachineId] = useState(\"\");\n            const [note, setNote] = useState(\"\");\n            const [before, setBefore] = useState({ x: \"\", y: \"\", z: \"\" });\n            const [after, setAfter] = useState({ x: \"\", y: \"\", z: \"\" });\n            const [isDemo, setIsDemo] = useState(true);\n\n            useEffect(() => {\n                const { db, collection, onSnapshot, query, orderBy } = window.fs;\n                if (db) {\n                    setIsDemo(false);\n                    const q = query(collection(db, \"shims_pro\"), orderBy(\"timestamp\", \"desc\"));\n                    return onSnapshot(q, (snapshot) => {\n                        setLogs(snapshot.docs.map(d => ({ id: d.id, ...d.data() })));\n                    });\n                } else {\n                    const saved = localStorage.getItem(\"shims_storage_v1\");\n                    if (saved) setLogs(JSON.parse(saved));\n                }\n            }, []);\n\n            const delta = useMemo(() => {\n                const diff = (a, b) => {\n                    const res = (parseFloat(a || 0) - parseFloat(b || 0)).toFixed(2);\n                    return isNaN(res) ? \"0.00\" : res;\n                };\n                return { x: diff(after.x, before.x), y: diff(after.y, before.y), z: diff(after.z, before.z) };\n            }, [before, after]);\n\n            const saveEntry = async () => {\n                if (!machineId.trim()) return alert(\"Vänligen ange ett Maskin-ID.\");\n                \n                const entry = {\n                    machineId,\n                    before,\n                    after,\n                    delta,\n                    note,\n                    timestamp: new Date().toISOString()\n                };\n\n                const { db, collection, addDoc, serverTimestamp } = window.fs;\n                if (db) {\n                    await addDoc(collection(db, \"shims_pro\"), { ...entry, timestamp: serverTimestamp() });\n                } else {\n                    const newEntry = { ...entry, id: Date.now().toString() };\n                    const newLogs = [newEntry, ...logs];\n                    setLogs(newLogs);\n                    localStorage.setItem(\"shims_storage_v1\", JSON.stringify(newLogs));\n                }\n                \n                setMachineId(\"\"); setNote(\"\"); setBefore({x:\"\",y:\"\",z:\"\"}); setAfter({x:\"\",y:\"\",z:\"\"});\n            };\n\n            const removeLog = async (e, id, index) => {\n                e.stopPropagation(); // Hindra expandering vid radering\n                if (!confirm(\"Vill du radera denna mätning?\")) return;\n                const { db, doc, deleteDoc } = window.fs;\n                if (db && id) {\n                    await deleteDoc(doc(db, \"shims_pro\", id));\n                } else {\n                    const newLogs = logs.filter((l, i) => (l.id || i) !== (id || index));\n                    setLogs(newLogs);\n                    localStorage.setItem(\"shims_storage_v1\", JSON.stringify(newLogs));\n                }\n            };\n\n            const toggleExpand = (id) => {\n                const newExpanded = new Set(expandedIds);\n                if (newExpanded.has(id)) {\n                    newExpanded.delete(id);\n                } else {\n                    newExpanded.add(id);\n                }\n                setExpandedIds(newExpanded);\n            };\n\n            const exportToText = () => {\n                if (logs.length === 0) return alert(\"Det finns ingen data att exportera.\");\n                \n                let content = \"Shimslogg Geometri - Data\\n\";\n                content += \"==========================\\n\\n\";\n                \n                logs.forEach((log, index) => {\n                    const date = new Date(log.timestamp?.seconds ? log.timestamp.seconds * 1000 : log.timestamp).toLocaleString('sv-SE');\n                    content += `MÄTNING #${logs.length - index}\\n`;\n                    content += `Datum: ${date}\\n`;\n                    content += `Maskin-ID: ${log.machineId}\\n`;\n                    content += `--------------------------\\n`;\n                    content += `VÄRDEN (mm):\\n`;\n                    content += `X: Före: ${log.before.x || '0.00'} | Efter: ${log.after.x || '0.00'} | Diff: ${log.delta.x}\\n`;\n                    content += `Y: Före: ${log.before.y || '0.00'} | Efter: ${log.after.y || '0.00'} | Diff: ${log.delta.y}\\n`;\n                    content += `Z: Före: ${log.before.z || '0.00'} | Efter: ${log.after.z || '0.00'} | Diff: ${log.delta.z}\\n`;\n                    if (log.note) content += `Notering: ${log.note}\\n`;\n                    content += `\\n**************************\\n\\n`;\n                });\n\n                const blob = new Blob([content], { type: \"text/plain\" });\n                const url = URL.createObjectURL(blob);\n                const link = document.createElement(\"a\");\n                link.href = url;\n                link.download = `shimslogg_export_${new Date().toISOString().split('T')[0]}.txt`;\n                document.body.appendChild(link);\n                link.click();\n                document.body.removeChild(link);\n                URL.revokeObjectURL(url);\n            };\n\n            return (\n                <div className=\"max-w-md mx-auto min-h-screen p-4 pb-20\">\n                    <header className=\"flex items-center justify-between mb-8 pt-4\">\n                        <div className=\"flex items-center gap-3\">\n                            <div className=\"bg-blue-600 p-2.5 rounded-xl text-white shadow-lg shadow-blue-200\">\n                                <Icons.Ruler />\n                            </div>\n                            <div>\n                                <h1 className=\"font-bold text-xl tracking-tight\"> Geometri analys support</h1>\n                                <p className=\"text-[10px] text-slate-400 font-semibold uppercase tracking-widest\">Shims-uträknare</p>\n                            </div>\n                        </div>\n                        {isDemo && (\n                            <div className=\"flex flex-col items-end\">\n                                <span className=\"text-[10px] bg-amber-100 text-amber-700 font-bold px-2 py-1 rounded-full uppercase tracking-tighter\">Lokal Lagring</span>\n                            </div>\n                        )}\n                    </header>\n\n                    {/* Inmatningssektion */}\n                    <div className=\"bg-white rounded-3xl shadow-sm border border-slate-100 p-5 mb-8\">\n                        <div className=\"mb-5\">\n                            <label className=\"text-[11px] font-bold text-slate-400 uppercase ml-1 mb-1 block\">Identifiering</label>\n                            <input \n                                value={machineId} \n                                onChange={e => setMachineId(e.target.value)} \n                                placeholder=\"T.ex. Motor 04 / Pump B\" \n                                className=\"w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 ring-blue-500/20 border border-transparent focus:border-blue-500/20 font-semibold transition-all\"\n                            />\n                        </div>\n\n                        <div className=\"grid grid-cols-2 gap-6 mb-6\">\n                            <div className=\"space-y-3\">\n                                <label className=\"text-[11px] font-bold text-slate-400 uppercase ml-1 block\">Före (mm)</label>\n                                {['x','y','z'].map(a => (\n                                    <div key={a} className=\"relative\">\n                                        <span className=\"absolute left-3 top-1/2 -translate-y-1/2 text-[10px] font-bold text-slate-300 uppercase\">{a}</span>\n                                        <input \n                                            type=\"number\" \n                                            step=\"0.01\"\n                                            value={before[a]} \n                                            onChange={e => setBefore({...before,[a]:e.target.value})} \n                                            className=\"w-full pl-7 p-3 bg-slate-50 rounded-xl text-sm border border-transparent focus:bg-white focus:border-slate-200 outline-none transition-all\" \n                                        />\n                                    </div>\n                                ))}\n                            </div>\n                            <div className=\"space-y-3\">\n                                <label className=\"text-[11px] font-bold text-blue-500 uppercase ml-1 block\">Efter (mm)</label>\n                                {['x','y','z'].map(a => (\n                                    <div key={a} className=\"relative\">\n                                        <span className=\"absolute left-3 top-1/2 -translate-y-1/2 text-[10px] font-bold text-blue-200 uppercase\">{a}</span>\n                                        <input \n                                            type=\"number\" \n                                            step=\"0.01\"\n                                            value={after[a]} \n                                            onChange={e => setAfter({...after, [a]:e.target.value})} \n                                            className=\"w-full pl-7 p-3 bg-blue-50/50 rounded-xl text-sm border border-transparent focus:bg-white focus:border-blue-100 outline-none transition-all text-blue-700 font-medium\" \n                                        />\n                                    </div>\n                                ))}\n                            </div>\n                        </div>\n\n                        <div className=\"flex items-center gap-3 pt-2 border-t border-slate-50\">\n                            <input \n                                value={note} \n                                onChange={e => setNote(e.target.value)} \n                                placeholder=\"Lägg till en notering...\" \n                                className=\"flex-1 p-2 text-sm outline-none bg-transparent placeholder:text-slate-300\" \n                            />\n                            <button \n                                onClick={saveEntry} \n                                className=\"bg-blue-600 text-white p-4 rounded-2xl hover:bg-blue-700 active:scale-90 shadow-lg shadow-blue-200 transition-all\"\n                            >\n                                <Icons.Save />\n                            </button>\n                        </div>\n                    </div>\n\n                    {/* Historiklista */}\n                    <div className=\"space-y-4\">\n                        <div className=\"flex items-center justify-between px-2\">\n                            <h2 className=\"text-xs font-bold text-slate-400 uppercase tracking-widest\">Senaste mätningar</h2>\n                            <button \n                                onClick={exportToText}\n                                className=\"flex items-center gap-1.5 text-[10px] font-bold text-blue-600 bg-blue-50 px-3 py-1.5 rounded-full hover:bg-blue-100 transition-colors\"\n                            >\n                                <Icons.Download />\n                                EXPORTERA DATA\n                            </button>\n                        </div>\n                        \n                        {logs.length === 0 && (\n                            <div className=\"text-center py-12 bg-white rounded-3xl border border-dashed border-slate-200\">\n                                <p className=\"text-slate-400 text-sm italic\">Inga loggar sparade ännu.</p>\n                            </div>\n                        )}\n\n                        {logs.map((log, i) => {\n                            const id = log.id || i;\n                            const isExpanded = expandedIds.has(id);\n                            \n                            return (\n                                <div \n                                    key={id} \n                                    onClick={() => toggleExpand(id)}\n                                    className=\"log-card bg-white border border-slate-100 rounded-3xl p-5 shadow-sm relative cursor-pointer hover:border-blue-100 overflow-hidden animate-in fade-in slide-in-from-bottom-2\"\n                                >\n                                    <div className=\"flex justify-between items-start mb-4\">\n                                        <div className=\"flex-1\">\n                                            <div className=\"flex items-center gap-2\">\n                                                <h3 className=\"font-bold text-slate-800 text-base\">{log.machineId}</h3>\n                                                <div className=\"text-slate-300\">\n                                                    {isExpanded ? <Icons.ChevronUp /> : <Icons.ChevronDown />}\n                                                </div>\n                                            </div>\n                                            <p className=\"text-[10px] text-slate-400 font-medium uppercase mt-0.5\">\n                                                {new Date(log.timestamp?.seconds ? log.timestamp.seconds * 1000 : log.timestamp).toLocaleDateString('sv-SE', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' })}\n                                            </p>\n                                        </div>\n                                        <button \n                                            onClick={(e) => removeLog(e, log.id, i)} \n                                            className=\"p-2 text-slate-200 hover:text-rose-500 hover:bg-rose-50 rounded-lg transition-colors z-10\"\n                                        >\n                                            <Icons.Trash />\n                                        </button>\n                                    </div>\n\n                                    {/* Huvudvy: Delta (alltid synlig) */}\n                                    <div className=\"grid grid-cols-3 gap-3\">\n                                        {['x','y','z'].map(axis => (\n                                            <div key={axis} className=\"bg-slate-50/80 rounded-2xl p-3 text-center border border-slate-100/50\">\n                                                <span className=\"text-[9px] font-bold uppercase text-slate-400 block mb-1\">{axis} (Δ)</span>\n                                                <span className={`text-sm font-mono font-bold ${parseFloat(log.delta[axis]) > 0 ? 'text-emerald-600' : parseFloat(log.delta[axis]) < 0 ? 'text-rose-600' : 'text-slate-300'}`}>\n                                                    {parseFloat(log.delta[axis]) > 0 ? '+' : ''}{log.delta[axis]}\n                                                </span>\n                                            </div>\n                                        ))}\n                                    </div>\n\n                                    {/* Expanderad vy: Detaljer (Före & Efter) */}\n                                    {isExpanded && (\n                                        <div className=\"mt-5 pt-5 border-t border-slate-50 animate-in fade-in zoom-in-95 duration-200\">\n                                            <div className=\"grid grid-cols-2 gap-4\">\n                                                <div className=\"space-y-2\">\n                                                    <span className=\"text-[10px] font-bold text-slate-400 uppercase tracking-tight block\">Före</span>\n                                                    {['x','y','z'].map(axis => (\n                                                        <div key={axis} className=\"flex justify-between items-center text-xs bg-slate-50 px-3 py-1.5 rounded-lg\">\n                                                            <span className=\"text-slate-300 uppercase font-bold text-[9px]\">{axis}</span>\n                                                            <span className=\"font-mono text-slate-600\">{log.before[axis] || '0.00'}</span>\n                                                        </div>\n                                                    ))}\n                                                </div>\n                                                <div className=\"space-y-2\">\n                                                    <span className=\"text-[10px] font-bold text-blue-400 uppercase tracking-tight block text-right\">Efter</span>\n                                                    {['x','y','z'].map(axis => (\n                                                        <div key={axis} className=\"flex justify-between items-center text-xs bg-blue-50/50 px-3 py-1.5 rounded-lg border border-blue-50\">\n                                                            <span className=\"text-blue-200 uppercase font-bold text-[9px]\">{axis}</span>\n                                                            <span className=\"font-mono text-blue-700 font-medium\">{log.after[axis] || '0.00'}</span>\n                                                        </div>\n                                                    ))}\n                                                </div>\n                                            </div>\n                                            \n                                            {log.note && (\n                                                <div className=\"mt-4 p-3 bg-amber-50/50 rounded-2xl border border-amber-100/20\">\n                                                    <p className=\"text-[11px] text-amber-800 leading-relaxed italic\">\"{log.note}\"</p>\n                                                </div>\n                                            )}\n                                        </div>\n                                    )}\n                                </div>\n                            );\n                        })}\n                    </div>\n                </div>\n            );\n        }\n\n        const root = ReactDOM.createRoot(document.getElementById(\"root\"));\n        root.render(<App />);\n    <\/script>\n</body>\n</html>\n"},{"name":"Uträknare Fram Bak In UT","content":"<!DOCTYPE html>\n<html lang=\"sv\">\n<head>\n    <meta charset=\"UTF-8\">\n    <title>CM4D Offset - Polarity Fix</title>\n    <script src=\"https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js\"><\/script>\n    <style>\n        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; color: #1e293b; }\n        .container { max-width: 1400px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }\n        \n        .header { border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }\n        .controls { display: flex; flex-wrap: wrap; gap: 15px; background: #f8fafc; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #e2e8f0; }\n        \n        .paste-area { flex: 1; min-width: 300px; }\n        textarea { width: 100%; height: 60px; padding: 8px; border: 1px solid #cbd5e1; border-radius: 4px; font-family: monospace; font-size: 12px; }\n        \n        table { width: 100%; border-collapse: collapse; }\n        th { background: #0f172a; color: white; padding: 12px; text-align: left; font-size: 13px; position: sticky; top: 0; z-index: 10; }\n        td { padding: 8px 12px; border-bottom: 1px solid #e2e8f0; }\n        \n        .X-row { border-left: 5px solid #3b82f6; }\n        .Y-row { border-left: 5px solid #10b981; }\n        .axis-divider { background: #e2e8f0; font-weight: bold; text-align: center; padding: 8px; font-size: 14px; color: #0f172a; }\n        \n        input { width: 90px; padding: 8px; border: 1px solid #cbd5e1; border-radius: 4px; font-weight: bold; text-align: center; }\n        .v2, .v3 { background: #f0fdf4; border: 1px solid #22c55e !important; }\n        \n        .netto-cell { font-weight: bold; font-size: 1.1em; text-align: center; width: 150px; }\n        .math-cell { font-family: monospace; font-weight: bold; text-align: center; border-radius: 4px; width: 90px; padding: 5px; }\n        \n        /* Färgkodning baserat på din nya begäran */\n        .pos { color: #166534; background: #dcfce7; padding: 4px 8px; border-radius: 4px; display: inline-block; min-width: 90px; border: 1px solid #166534; }\n        .neg { color: #991b1b; background: #fee2e2; padding: 4px 8px; border-radius: 4px; display: inline-block; min-width: 90px; border: 1px solid #991b1b; }\n        \n        .btn { background: #0f172a; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; }\n        .btn:hover { background: #334155; }\n        .btn-blue { background: #2563eb; }\n    </style>\n</head>\n<body>\n\n<div class=\"container\">\n    <div class=\"header\">\n        <h2 style=\"margin:0\">Spindeljustering 1-28 (Ut = + / In = -)</h2>\n        <label class=\"btn btn-blue\" style=\"cursor:pointer\">LADDA CSV-FIL<input type=\"file\" id=\"csvInput\" accept=\".csv\" hidden></label>\n    </div>\n\n    <div class=\"controls\">\n        <div class=\"paste-area\">\n            <label style=\"font-size: 12px; font-weight: bold;\">Klistra in kolumn från Excel här:</label>\n            <textarea id=\"bulkInput\" placeholder=\"Kopiera en kolumn i Excel och klistra in här...\"></textarea>\n        </div>\n        <div style=\"display: flex; flex-direction: column; gap: 10px;\">\n            <button class=\"btn\" onclick=\"applySmartList('X', 'v2')\">Fyll V2 Justering (X)</button>\n            <button class=\"btn\" onclick=\"applySmartList('X', 'v3')\">Fyll V3 Mål (X)</button>\n        </div>\n        <div style=\"display: flex; flex-direction: column; gap: 10px;\">\n            <button class=\"btn\" onclick=\"applySmartList('Y', 'v2')\">Fyll V2 Justering (Y)</button>\n            <button class=\"btn\" onclick=\"applySmartList('Y', 'v3')\">Fyll V3 Mål (Y)</button>\n        </div>\n    </div>\n    \n    <table id=\"resultTable\">\n        <thead>\n            <tr>\n                <th>Spindel</th>\n                <th>Axel</th>\n                <th>Värde 1 (CSV)</th>\n                <th>Värde 2 (Justering)</th>\n                <th>Värde 3 (Mål)</th>\n                <th>Anvisning</th>\n                <th>Matematiskt Netto</th>\n            </tr>\n        </thead>\n        <tbody id=\"tableBody\"></tbody>\n    </table>\n</div>\n\n<script>\nconst SPINDEL_MAP = {\n    43:1, 42:2, 41:3, 40:4, 23:5, 22:6, 21:7, 20:8, 59:9, 58:10,\n    57:11, 56:12, 55:13, 54:14, 27:15, 26:16, 25:17, 24:18, 53:19, 52:20,\n    51:21, 50:22, 49:23, 48:24, 47:25, 46:26, 45:27, 44:28\n};\n\nfunction initTable() {\n    const tbody = document.getElementById(\"tableBody\");\n    tbody.innerHTML = \"\";\n    [\"X\", \"Y\"].forEach(axis => {\n        const div = document.createElement(\"tr\");\n        div.innerHTML = `<td colspan=\"7\" class=\"axis-divider\">--- ${axis}-AXLAR (1-28) ---</td>`;\n        tbody.appendChild(div);\n        \n        for (let i = 1; i <= 28; i++) {\n            const tr = document.createElement(\"tr\");\n            tr.className = axis === \"X\" ? \"X-row\" : \"Y-row\";\n            tr.setAttribute(\"data-spindel\", i);\n            tr.setAttribute(\"data-axis\", axis);\n            tr.innerHTML = `\n                <td><b>${i}</b></td>\n                <td><b>${axis}</b></td>\n                <td><input type=\"text\" class=\"v1\" placeholder=\"CSV\" oninput=\"calc(this)\"></td>\n                <td><input type=\"text\" class=\"v2\" placeholder=\"Justera\" oninput=\"calc(this)\"></td>\n                <td><input type=\"text\" class=\"v3\" placeholder=\"Mål\" oninput=\"calc(this)\"></td>\n                <td class=\"netto-cell\">-</td>\n                <td class=\"math-cell\">-</td>\n            `;\n            tbody.appendChild(tr);\n        }\n    });\n}\n\nfunction parseRichValue(str) {\n    if (!str || str.trim() === \"\") return 0;\n    let s = str.toString().toUpperCase().replace(',', '.').trim();\n    // Hantera dina prefix/suffix\n    let isNegative = s.includes('B') || s.includes('O') || s.includes('IN') || s.includes('-');\n    // Specialfall: Om du skriver \"IN\" vill vi att det blir minus. Om du skriver \"UT\" vill vi att det blir plus.\n    let num = parseFloat(s.replace(/[^0-9.]/g, '')) || 0;\n    \n    // Om användaren skriver \"UT0.5\" ska det vara plus. Om användaren skriver \"IN0.5\" ska det vara minus.\n    if (s.includes('UT')) return num;\n    if (s.includes('IN')) return -num;\n    \n    return isNegative ? -num : num;\n}\n\nfunction applySmartList(axis, targetCol) {\n    const rawData = document.getElementById('bulkInput').value;\n    const lines = rawData.split(/\\r?\\n|\\t/);\n    \n    for (let i = 0; i < lines.length; i++) {\n        const spindelNum = i + 1;\n        if (spindelNum > 28) break;\n        \n        const targetRow = document.querySelector(`tr[data-spindel=\"${spindelNum}\"][data-axis=\"${axis}\"]`);\n        if (targetRow) {\n            const input = targetRow.querySelector('.' + targetCol);\n            input.value = lines[i].trim();\n            calc(input);\n        }\n    }\n}\n\ndocument.getElementById('csvInput').onchange = function(e) {\n    const file = e.target.files[0];\n    Papa.parse(file, {\n        skipEmptyLines: true,\n        complete: function(results) {\n            const rows = results.data;\n            let headerIdx = rows.findIndex(r => r.includes(\"Feature\"));\n            if(headerIdx === -1) return;\n            const headers = rows[headerIdx];\n            const colFeat = headers.indexOf(\"Feature\");\n            const colChar = headers.indexOf(\"Char\");\n            const colMean = headers.indexOf(\"Mean\");\n\n            rows.slice(headerIdx + 1).forEach(row => {\n                const char = (row[colChar] || \"\").toUpperCase();\n                const feat = row[colFeat] || \"\";\n                if (feat.includes(\"_\")) {\n                    const spId = SPINDEL_MAP[parseInt(feat.split(\"_\")[1])];\n                    const targetRow = document.querySelector(`tr[data-spindel=\"${spId}\"][data-axis=\"${char}\"]`);\n                    if (targetRow) {\n                        const input = targetRow.querySelector('.v1');\n                        input.value = row[colMean] || \"\";\n                        calc(input);\n                    }\n                }\n            });\n        }\n    });\n};\n\nfunction calc(input) {\n    const row = input.closest('tr');\n    const axis = row.getAttribute('data-axis');\n    const v1 = parseRichValue(row.querySelector('.v1').value);\n    const v2 = parseRichValue(row.querySelector('.v2').value);\n    const v3 = parseRichValue(row.querySelector('.v3').value);\n    \n    // Matematik: (Nuvarande mätvärde + Tidigare justering) - Börvärde\n    const res = (v1 + v2) - v3;\n    \n    const resCell = row.querySelector('.netto-cell');\n    const mathCell = row.querySelector('.math-cell');\n    \n    if (!row.querySelector('.v1').value && !row.querySelector('.v2').value) return;\n\n    let label = \"\";\n    let colorClass = \"\";\n\n    if (axis === \"X\") {\n        // För X: Plus (+) är Bak, Minus (-) är Fram\n        label = res >= 0 ? \" Bak\" : \" Fram\";\n        colorClass = res >= 0 ? \"pos\" : \"neg\";\n    } else {\n        // För Y: Plus (+) är Ut, Minus (-) är In (Enligt önskemål)\n        label = res >= 0 ? \" Ut\" : \" In\";\n        colorClass = res >= 0 ? \"pos\" : \"neg\";\n    }\n\n    const absRes = Math.abs(res).toFixed(2);\n    const sign = res >= 0 ? \"+\" : \"-\";\n\n    resCell.innerHTML = `<span class=\"${colorClass}\">${absRes}${label}</span>`;\n    mathCell.innerText = `${sign}${absRes}`;\n    mathCell.style.background = res >= 0 ? \"#dcfce7\" : \"#fee2e2\";\n    mathCell.style.color = res >= 0 ? \"#166534\" : \"#991b1b\";\n}\n\nwindow.onload = initTable;\n<\/script>\n</body>\n</html>"},{"name":"Flytenhetsuträknare","content":"<!DOCTYPE html>\n<html lang=\"sv\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Vinkelmätare – Dragare Avvikelseanalys</title>\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js\"><\/script>\n<style>\n  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap');\n\n  :root {\n    --bg: #0d0f14;\n    --surface: #141720;\n    --surface2: #1c2130;\n    --border: #2a3045;\n    --accent: #3b82f6;\n    --accent2: #6366f1;\n    --ok: #10b981;\n    --warn: #f59e0b;\n    --fail: #ef4444;\n    --spread: #a855f7;\n    --text: #e2e8f0;\n    --muted: #64748b;\n    --mono: 'DM Mono', monospace;\n    --head: 'Syne', sans-serif;\n  }\n\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n\n  body {\n    background: var(--bg);\n    color: var(--text);\n    font-family: var(--mono);\n    min-height: 100vh;\n    padding: 24px;\n  }\n\n  .page { max-width: 1360px; margin: 0 auto; }\n\n  header {\n    border-bottom: 1px solid var(--border);\n    padding-bottom: 20px;\n    margin-bottom: 28px;\n    display: flex;\n    align-items: flex-end;\n    gap: 20px;\n    flex-wrap: wrap;\n  }\n\n  .logo-block h1 {\n    font-family: var(--head);\n    font-size: 26px;\n    font-weight: 800;\n    letter-spacing: -0.5px;\n    color: #fff;\n  }\n\n  .logo-block p {\n    font-size: 12px;\n    color: var(--muted);\n    margin-top: 2px;\n  }\n\n  .badge {\n    background: var(--surface2);\n    border: 1px solid var(--border);\n    border-radius: 6px;\n    padding: 6px 12px;\n    font-size: 11px;\n    color: var(--muted);\n    letter-spacing: 0.05em;\n  }\n\n  .badge span { color: var(--accent); font-weight: 500; }\n\n  /* Layout */\n  .layout {\n    display: grid;\n    grid-template-columns: 680px 1fr;\n    gap: 24px;\n    align-items: start;\n  }\n\n  /* Canvas */\n  .canvas-wrap {\n    background: var(--surface);\n    border: 1px solid var(--border);\n    border-radius: 16px;\n    padding: 20px;\n    position: relative;\n  }\n\n  #mainCanvas {\n    display: block;\n    width: 100%;\n    border-radius: 50%;\n    border: 2px solid var(--border);\n  }\n\n  .canvas-legend {\n    display: flex;\n    flex-wrap: wrap;\n    gap: 14px;\n    margin-top: 14px;\n  }\n\n  .leg-item {\n    display: flex;\n    align-items: center;\n    gap: 6px;\n    font-size: 11px;\n    color: var(--muted);\n  }\n\n  .leg-dot {\n    width: 10px; height: 10px;\n    border-radius: 50%;\n    flex-shrink: 0;\n  }\n\n  .leg-ring {\n    width: 14px; height: 14px;\n    border-radius: 50%;\n    border: 2px solid;\n    flex-shrink: 0;\n    background: transparent;\n  }\n\n  /* Controls */\n  .controls {\n    display: flex;\n    flex-direction: column;\n    gap: 16px;\n  }\n\n  .card {\n    background: var(--surface);\n    border: 1px solid var(--border);\n    border-radius: 12px;\n    padding: 18px;\n  }\n\n  .card-title {\n    font-family: var(--head);\n    font-size: 11px;\n    font-weight: 700;\n    letter-spacing: 0.1em;\n    text-transform: uppercase;\n    color: var(--muted);\n    margin-bottom: 14px;\n  }\n\n  .field-row {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 12px;\n    margin-bottom: 12px;\n  }\n\n  .field {\n    display: flex;\n    flex-direction: column;\n    gap: 4px;\n  }\n\n  label {\n    font-size: 10px;\n    color: var(--muted);\n    letter-spacing: 0.05em;\n    text-transform: uppercase;\n  }\n\n  input[type=\"number\"], input[type=\"text\"] {\n    background: var(--bg);\n    border: 1px solid var(--border);\n    border-radius: 6px;\n    padding: 10px 12px;\n    color: var(--text);\n    font-family: var(--mono);\n    font-size: 15px;\n    width: 100%;\n    transition: border-color 0.15s;\n  }\n\n  input[type=\"number\"]:focus, input[type=\"text\"]:focus {\n    outline: none;\n    border-color: var(--accent);\n  }\n\n  /* Live readout */\n  .readout {\n    background: var(--bg);\n    border: 1px solid var(--border);\n    border-radius: 8px;\n    padding: 14px 16px;\n    display: grid;\n    grid-template-columns: 1fr 1fr 1fr;\n    gap: 12px;\n    margin-bottom: 12px;\n  }\n\n  .readout-item label {\n    display: block;\n    font-size: 10px;\n    color: var(--muted);\n    margin-bottom: 4px;\n  }\n\n  .readout-value {\n    font-size: 20px;\n    font-weight: 500;\n    color: var(--text);\n  }\n\n  .readout-value.ok { color: var(--ok); }\n  .readout-value.fail { color: var(--fail); }\n  .readout-value.spread-val { color: var(--spread); }\n\n  /* Status bar */\n  .status-bar {\n    border-radius: 8px;\n    padding: 10px 16px;\n    font-family: var(--head);\n    font-size: 13px;\n    font-weight: 700;\n    letter-spacing: 0.03em;\n    text-align: center;\n    transition: background 0.3s;\n  }\n\n  .status-bar.ok { background: rgba(16,185,129,0.15); color: var(--ok); border: 1px solid rgba(16,185,129,0.3); }\n  .status-bar.warn { background: rgba(245,158,11,0.15); color: var(--warn); border: 1px solid rgba(245,158,11,0.3); }\n  .status-bar.fail { background: rgba(239,68,68,0.15); color: var(--fail); border: 1px solid rgba(239,68,68,0.3); }\n\n  /* Buttons */\n  .btn-row {\n    display: flex;\n    flex-wrap: wrap;\n    gap: 8px;\n  }\n\n  .btn {\n    padding: 10px 18px;\n    border: none;\n    border-radius: 7px;\n    font-family: var(--mono);\n    font-size: 12px;\n    font-weight: 500;\n    cursor: pointer;\n    letter-spacing: 0.03em;\n    transition: opacity 0.15s, transform 0.1s;\n  }\n\n  .btn:hover { opacity: 0.85; transform: translateY(-1px); }\n  .btn:active { transform: translateY(0); }\n\n  .btn-primary { background: var(--accent); color: #fff; }\n  .btn-purple { background: var(--accent2); color: #fff; }\n  .btn-green { background: var(--ok); color: #fff; }\n  .btn-muted { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }\n  .btn-danger { background: var(--fail); color: #fff; }\n\n  textarea {\n    width: 100%;\n    height: 130px;\n    background: var(--bg);\n    border: 1px solid var(--border);\n    border-radius: 6px;\n    padding: 10px 12px;\n    color: var(--text);\n    font-family: var(--mono);\n    font-size: 13px;\n    resize: vertical;\n  }\n\n  textarea:focus { outline: none; border-color: var(--accent2); }\n\n  /* Table */\n  .table-wrap {\n    margin-top: 28px;\n    background: var(--surface);\n    border: 1px solid var(--border);\n    border-radius: 12px;\n    overflow: hidden;\n  }\n\n  .table-header {\n    padding: 14px 20px;\n    border-bottom: 1px solid var(--border);\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    flex-wrap: wrap;\n    gap: 10px;\n  }\n\n  .table-header h2 {\n    font-family: var(--head);\n    font-size: 14px;\n    font-weight: 700;\n  }\n\n  .summary-chips {\n    display: flex;\n    gap: 8px;\n    flex-wrap: wrap;\n  }\n\n  .chip {\n    padding: 4px 10px;\n    border-radius: 20px;\n    font-size: 11px;\n    font-weight: 500;\n  }\n\n  .chip-ok { background: rgba(16,185,129,0.15); color: var(--ok); border: 1px solid rgba(16,185,129,0.3); }\n  .chip-fail { background: rgba(239,68,68,0.15); color: var(--fail); border: 1px solid rgba(239,68,68,0.3); }\n  .chip-warn { background: rgba(168,85,247,0.15); color: var(--spread); border: 1px solid rgba(168,85,247,0.3); }\n  .chip-total { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }\n\n  table {\n    width: 100%;\n    border-collapse: collapse;\n    font-size: 12px;\n  }\n\n  thead th {\n    background: var(--surface2);\n    padding: 10px 14px;\n    text-align: left;\n    color: var(--muted);\n    font-size: 10px;\n    text-transform: uppercase;\n    letter-spacing: 0.05em;\n    border-bottom: 1px solid var(--border);\n  }\n\n  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }\n  tbody tr:hover { background: var(--surface2); }\n  tbody tr:last-child { border-bottom: none; }\n\n  td {\n    padding: 10px 14px;\n    vertical-align: middle;\n  }\n\n  .status-cell {\n    font-family: var(--head);\n    font-size: 11px;\n    font-weight: 700;\n    padding: 3px 9px;\n    border-radius: 4px;\n    display: inline-block;\n    white-space: nowrap;\n  }\n\n  .cell-ok { background: rgba(16,185,129,0.15); color: var(--ok); border: 1px solid rgba(16,185,129,0.25); }\n  .cell-fail { background: rgba(239,68,68,0.15); color: var(--fail); border: 1px solid rgba(239,68,68,0.25); }\n  .cell-warn { background: rgba(245,158,11,0.15); color: var(--warn); border: 1px solid rgba(245,158,11,0.25); }\n\n  .mini-img {\n    width: 64px; height: 64px;\n    border-radius: 50%;\n    border: 2px solid var(--border);\n    cursor: pointer;\n    transition: border-color 0.15s;\n  }\n  .mini-img:hover { border-color: var(--accent); }\n\n  /* Modal */\n  #modal {\n    display: none;\n    position: fixed;\n    inset: 0;\n    background: rgba(0,0,0,0.92);\n    justify-content: center;\n    align-items: center;\n    z-index: 1000;\n  }\n\n  .modal-inner {\n    background: var(--surface);\n    border: 1px solid var(--border);\n    padding: 28px;\n    border-radius: 16px;\n    text-align: center;\n    max-width: 580px;\n    width: 90%;\n  }\n\n  .modal-inner h3 {\n    font-family: var(--head);\n    margin-bottom: 16px;\n    font-size: 15px;\n  }\n\n  #modalCanvas {\n    border: 2px solid var(--border);\n    border-radius: 50%;\n    max-width: 100%;\n  }\n\n  /* Angle explanation */\n  .angle-explain {\n    background: var(--bg);\n    border: 1px solid var(--border);\n    border-radius: 8px;\n    padding: 12px 14px;\n    font-size: 11px;\n    color: var(--muted);\n    line-height: 1.6;\n  }\n\n  .angle-explain strong { color: var(--text); }\n\n  /* spread indicator in readout */\n  .spread-zone-label {\n    font-size: 10px;\n    color: var(--spread);\n    margin-top: 2px;\n  }\n\n  @media (max-width: 900px) {\n    .layout { grid-template-columns: 1fr; }\n    .field-row { grid-template-columns: 1fr; }\n  }\n</style>\n</head>\n<body>\n<div class=\"page\">\n\n  <header>\n    <div class=\"logo-block\">\n      <h1>Vinkelmätare</h1>\n      <p>Dragare avvikelseanalys • Bultkraft under fordon</p>\n    </div>\n    <div class=\"badge\">Tolerans: <span id=\"toleranceBadge\">±1.2 mm</span></div>\n    <div class=\"badge\">Spread: <span id=\"spreadBadge\">1.2 mm</span></div>\n  </header>\n\n  <div class=\"layout\">\n\n    <!-- Canvas -->\n    <div class=\"canvas-wrap\">\n      <canvas id=\"mainCanvas\" width=\"640\" height=\"640\"></canvas>\n      <div class=\"canvas-legend\">\n        <div class=\"leg-item\"><div class=\"leg-ring\" style=\"border-color: #3b82f6; background: rgba(59,130,246,0.1);\"></div> Tillåten zon (tolerans)</div>\n        <div class=\"leg-item\"><div class=\"leg-dot\" style=\"background:#ef4444;\"></div> Uppmätt punkt</div>\n        <div class=\"leg-item\"><div class=\"leg-ring\" style=\"border-color: #a855f7; background: rgba(168,85,247,0.08);\"></div> Spridningszon (spread)</div>\n        <div class=\"leg-item\"><div class=\"leg-dot\" style=\"background: rgba(168,85,247,0.4);\"></div> Möjlig träffzon</div>\n        <div class=\"leg-item\"><div class=\"leg-ring\" style=\"border-color: #f59e0b;\"></div> Spridning rör toleransgräns</div>\n      </div>\n    </div>\n\n    <!-- Controls -->\n    <div class=\"controls\">\n\n      <!-- Angle explain -->\n      <div class=\"card\">\n        <div class=\"card-title\">Hur det fungerar</div>\n        <div class=\"angle-explain\">\n          <strong>Centrum = 0 mm</strong> (perfekt position).<br>\n          X-axeln = avvikelse i sidled (mm).<br>\n          Y-axeln = avvikelse i djupled (mm).<br><br>\n          <strong>Spread</strong> = osäkerhetsradie runt mätpunkten. En lila cirkel visar var dragaren kan träffa givet mätosäkerhet/spel.<br><br>\n          Röd punkt = uppmätt avvikelse. Blå ring = tolerans. Lila ring = spread.\n          Om spread-cirkeln korsas av toleransringen → <span style=\"color: var(--warn);\">varning</span>.\n        </div>\n      </div>\n\n      <!-- Hidden inputs for tolerance and spread (fixed values) -->\n      <input type=\"hidden\" id=\"tolerance\" value=\"1.2\">\n      <input type=\"hidden\" id=\"spread\" value=\"1.2\">\n\n      <!-- Input -->\n      <div class=\"card\">\n        <div class=\"card-title\">Spindel</div>\n        <div class=\"field-row\">\n          <div class=\"field\">\n            <label>X-avvikelse (mm)</label>\n            <input type=\"number\" id=\"xInput\" value=\"0\" step=\"0.1\" oninput=\"liveUpdate()\" placeholder=\"t.ex. -1\">\n          </div>\n          <div class=\"field\">\n            <label>Y-avvikelse (mm)</label>\n            <input type=\"number\" id=\"yInput\" value=\"0\" step=\"0.1\" oninput=\"liveUpdate()\" placeholder=\"t.ex. 0.5\">\n          </div>\n        </div>\n        <div class=\"field\" style=\"margin-bottom: 12px;\">\n          <label>Kommentar</label>\n          <input type=\"text\" id=\"infoInput\" placeholder=\"t.ex. Bult #3 framvänster...\">\n        </div>\n\n        <!-- Live readout -->\n        <div class=\"readout\">\n          <div class=\"readout-item\">\n            <label>Avstånd från centrum</label>\n            <div class=\"readout-value\" id=\"distVal\">0.00 mm</div>\n          </div>\n          <div class=\"readout-item\">\n            <label>Marginal kvar</label>\n            <div class=\"readout-value\" id=\"margVal\">–</div>\n          </div>\n          <div class=\"readout-item\">\n            <label>Spridning når</label>\n            <div class=\"readout-value spread-val\" id=\"spreadReach\">–</div>\n          </div>\n        </div>\n\n        <div class=\"status-bar ok\" id=\"statusBar\">Klar för mätning</div>\n\n        <br>\n        <div class=\"btn-row\">\n          <button class=\"btn btn-primary\" onclick=\"addMeasurement()\">+ Lägg till punkt</button>\n          <button class=\"btn btn-muted\" onclick=\"clearInputs()\">Rensa fält</button>\n        </div>\n      </div>\n\n      <!-- Bulk paste -->\n      <div class=\"card\">\n        <div class=\"card-title\">Massinmatning (28 punkter)</div>\n        <textarea id=\"pasteArea\" placeholder=\"Klistra in här:&#10;Rad 1: alla 28 X-avvikelser&#10;Rad 2: alla 28 Y-avvikelser&#10;(Värden i mm)\"></textarea>\n        <br><br>\n        <div class=\"btn-row\">\n          <button class=\"btn btn-purple\" onclick=\"pasteBulk()\">Importera 28 punkter</button>\n        </div>\n      </div>\n\n      <!-- Vinkelfel inmatning -->\n      <div class=\"card\">\n        <div class=\"card-title\">Vinkelfel Spridning per spindel</div>\n        <div class=\"angle-explain\" style=\"margin-bottom:12px;\">\n          Klistra in eller skriv vinkelfel för varje spindel (1–28).<br>\n          Format: <strong>spindelnr[tab]vinkelfel</strong>, en per rad.<br>\n          Exempel: <code>1\t0,9</code>\n        </div>\n        <textarea id=\"vinkelfelsArea\" placeholder=\"1\t0,9&#10;2\t1&#10;3\t0,8&#10;...&#10;28\t0,6\" style=\"height:160px;\"></textarea>\n        <br><br>\n        <div class=\"btn-row\">\n          <button class=\"btn btn-purple\" onclick=\"importVinkelfel()\">Importera Vinkelfel Spridning</button>\n          <button class=\"btn btn-muted\" onclick=\"clearVinkelfel()\">Rensa</button>\n        </div>\n        <div id=\"vinkelfelsStatus\" style=\"margin-top:10px; font-size:11px; color:var(--muted);\"></div>\n      </div>\n\n      <!-- Export -->\n      <div class=\"card\">\n        <div class=\"card-title\">Export</div>\n        <div class=\"field\" style=\"margin-bottom: 12px;\">\n          <label>Rapportrubrik</label>\n          <input type=\"text\" id=\"pdfTitle\" value=\"Dragare Avvikelserapport\">\n        </div>\n        <div class=\"btn-row\">\n          <button class=\"btn btn-green\" onclick=\"exportToPDF()\">Exportera PDF</button>\n          <button class=\"btn btn-danger\" onclick=\"clearAll()\">Rensa allt</button>\n        </div>\n      </div>\n\n    </div>\n  </div>\n\n  <!-- Table -->\n  <div class=\"table-wrap\">\n    <div class=\"table-header\">\n      <h2>Spindellog</h2>\n      <div class=\"summary-chips\" id=\"summaryChips\"></div>\n    </div>\n    <table id=\"historyTable\">\n      <thead>\n        <tr>\n          <th>Spindel</th>\n          <th>X-avv (mm)</th>\n          <th>Y-avv (mm)</th>\n          <th>Avstånd från centrum</th>\n          <th>Marginal</th>\n          <th>Spread når</th>\n          <th>Vinkelfel Spridning (°)</th>\n          <th>Graf</th>\n          <th>Kommentar</th>\n          <th>Status</th>\n        </tr>\n      </thead>\n      <tbody></tbody>\n    </table>\n  </div>\n\n</div>\n\n<!-- Modal -->\n<div id=\"modal\">\n  <div class=\"modal-inner\">\n    <h3 id=\"modalTitle\"></h3>\n    <canvas id=\"modalCanvas\" width=\"500\" height=\"500\"></canvas>\n    <br><br>\n    <button class=\"btn btn-muted\" onclick=\"closeModal()\">Stäng</button>\n  </div>\n</div>\n\n<script>\nconst canvas = document.getElementById('mainCanvas');\nconst ctx = canvas.getContext('2d');\nconst C = 320; // center\nconst SCALE = 110; // px per degree\n\nlet measurements = [];\nlet vinkelfelData = {}; // spindel nr (1-based) -> vinkelfel value\n\n// ─── Draw ─────────────────────────────────────────────\nfunction drawDiagram(ctx, size, x, y, tolerance, spread, isThumb = false, pdfMode = false) {\n  const c = size / 2;\n  const sc = isThumb ? (size / 640) * SCALE : SCALE;\n  const lw = isThumb ? 1 : 1.5;\n\n  ctx.clearRect(0, 0, size, size);\n\n  // bg\n  ctx.fillStyle = pdfMode ? '#ffffff' : '#0d0f14';\n  ctx.fillRect(0, 0, size, size);\n\n  if (pdfMode) {\n    // ─── PDF: detailed mm grid ───\n    // 0.1 mm fine grid\n    ctx.strokeStyle = 'rgba(0,0,0,0.06)';\n    ctx.lineWidth = 0.5;\n    for (let i = -4; i <= 4; i += 0.1) {\n      const p = c + Math.round(i * sc * 10) / 10;\n      ctx.beginPath(); ctx.moveTo(p, 0); ctx.lineTo(p, size); ctx.stroke();\n      ctx.beginPath(); ctx.moveTo(0, p); ctx.lineTo(size, p); ctx.stroke();\n    }\n    // 0.5 mm medium grid\n    ctx.strokeStyle = 'rgba(0,0,0,0.13)';\n    ctx.lineWidth = 0.8;\n    for (let i = -4; i <= 4; i += 0.5) {\n      const p = c + i * sc;\n      ctx.beginPath(); ctx.moveTo(p, 0); ctx.lineTo(p, size); ctx.stroke();\n      ctx.beginPath(); ctx.moveTo(0, p); ctx.lineTo(size, p); ctx.stroke();\n    }\n    // 1 mm major grid\n    ctx.strokeStyle = 'rgba(0,0,0,0.25)';\n    ctx.lineWidth = 1.2;\n    for (let i = -4; i <= 4; i += 1) {\n      const p = c + i * sc;\n      ctx.beginPath(); ctx.moveTo(p, 0); ctx.lineTo(p, size); ctx.stroke();\n      ctx.beginPath(); ctx.moveTo(0, p); ctx.lineTo(size, p); ctx.stroke();\n    }\n    // X-axis labels every 0.5 mm\n    ctx.fillStyle = 'rgba(0,0,0,0.5)';\n    ctx.font = '11px DM Mono, monospace';\n    ctx.textAlign = 'center';\n    for (let i = -3; i <= 3; i += 0.5) {\n      if (i === 0) continue;\n      const p = c + i * sc;\n      ctx.fillText((i > 0 ? '+' : '') + i.toFixed(1), p, c - 6);\n    }\n    // Y-axis labels every 0.5 mm\n    ctx.textAlign = 'right';\n    for (let i = -3; i <= 3; i += 0.5) {\n      if (i === 0) continue;\n      const p = c - i * sc;\n      ctx.fillText((i > 0 ? '+' : '') + i.toFixed(1), c - 6, p + 4);\n    }\n    // axis labels\n    ctx.fillStyle = '#444';\n    ctx.font = 'bold 12px DM Mono, monospace';\n    ctx.textAlign = 'center';\n    ctx.fillText('X (mm)', size - 36, c - 10);\n    ctx.fillText('Y (mm)', c + 22, 16);\n  } else {\n    // ─── Screen grid ───\n    if (!isThumb) {\n      ctx.strokeStyle = 'rgba(255,255,255,0.04)';\n      ctx.lineWidth = 0.5;\n      for (let i = -4; i <= 4; i += 0.1) {\n        const p = c + i * sc;\n        ctx.beginPath(); ctx.moveTo(p, 0); ctx.lineTo(p, size); ctx.stroke();\n        ctx.beginPath(); ctx.moveTo(0, p); ctx.lineTo(size, p); ctx.stroke();\n      }\n    }\n    ctx.strokeStyle = 'rgba(255,255,255,0.07)';\n    ctx.lineWidth = lw * 0.5;\n    for (let i = -4; i <= 4; i += 0.5) {\n      const p = c + i * sc;\n      ctx.beginPath(); ctx.moveTo(p, 0); ctx.lineTo(p, size); ctx.stroke();\n      ctx.beginPath(); ctx.moveTo(0, p); ctx.lineTo(size, p); ctx.stroke();\n    }\n    if (!isThumb) {\n      ctx.fillStyle = 'rgba(100,116,139,0.7)';\n      ctx.font = '10px DM Mono, monospace';\n      ctx.textAlign = 'center';\n      for (let i = -3; i <= 3; i += 0.5) {\n        if (i === 0) continue;\n        const p = c + i * sc;\n        ctx.fillText((i > 0 ? '+' : '') + i.toFixed(1) + ' mm', p, c - 6);\n      }\n    }\n    // axes\n    ctx.strokeStyle = 'rgba(100,116,139,0.4)';\n    ctx.lineWidth = lw;\n    ctx.beginPath(); ctx.moveTo(0, c); ctx.lineTo(size, c); ctx.stroke();\n    ctx.beginPath(); ctx.moveTo(c, 0); ctx.lineTo(c, size); ctx.stroke();\n    if (!isThumb) {\n      ctx.fillStyle = '#64748b';\n      ctx.font = '11px Syne, sans-serif';\n      ctx.textAlign = 'left';\n      ctx.fillText('-X ←→ +X (mm)', 8, c - 10);\n      ctx.textAlign = 'center';\n      ctx.fillText('+Y', c + 6, 16);\n      ctx.fillText('-Y', c + 6, size - 8);\n    }\n  }\n\n  // axes (PDF)\n  if (pdfMode) {\n    ctx.strokeStyle = 'rgba(0,0,0,0.45)';\n    ctx.lineWidth = 1.5;\n    ctx.beginPath(); ctx.moveTo(0, c); ctx.lineTo(size, c); ctx.stroke();\n    ctx.beginPath(); ctx.moveTo(c, 0); ctx.lineTo(c, size); ctx.stroke();\n  }\n\n  // ─── Zones ───\n  const px = c + x * sc;\n  const py = c - y * sc;\n  const spreadPx = spread * sc;\n  const tolPx = tolerance * sc;\n  const dist = Math.sqrt(x * x + y * y);\n\n  // Spread fill\n  ctx.beginPath();\n  ctx.arc(px, py, spreadPx, 0, Math.PI * 2);\n  ctx.fillStyle = pdfMode ? 'rgba(168,85,247,0.08)' : 'rgba(168,85,247,0.10)';\n  ctx.fill();\n\n  // Tolerance zone\n  ctx.beginPath();\n  ctx.arc(c, c, tolPx, 0, Math.PI * 2);\n  ctx.fillStyle = pdfMode ? 'rgba(59,130,246,0.07)' : 'rgba(59,130,246,0.08)';\n  ctx.fill();\n  ctx.strokeStyle = '#3b82f6';\n  ctx.lineWidth = isThumb ? 1.5 : 3;\n  ctx.stroke();\n\n  // Spread ring\n  ctx.beginPath();\n  ctx.arc(px, py, spreadPx, 0, Math.PI * 2);\n  ctx.strokeStyle = '#a855f7';\n  ctx.lineWidth = isThumb ? 1 : 2;\n  ctx.setLineDash([5, 4]);\n  ctx.stroke();\n  ctx.setLineDash([]);\n\n  // Line center → point\n  ctx.strokeStyle = pdfMode ? 'rgba(239,68,68,0.5)' : 'rgba(239,68,68,0.4)';\n  ctx.lineWidth = isThumb ? 1 : 1.5;\n  ctx.setLineDash([3, 4]);\n  ctx.beginPath(); ctx.moveTo(c, c); ctx.lineTo(px, py); ctx.stroke();\n  ctx.setLineDash([]);\n\n  // Measured point\n  const r = isThumb ? 5 : 10;\n  ctx.beginPath();\n  ctx.arc(px, py, r, 0, Math.PI * 2);\n  ctx.fillStyle = dist <= tolerance ? '#10b981' : '#ef4444';\n  ctx.fill();\n  ctx.strokeStyle = pdfMode ? '#333' : '#fff';\n  ctx.lineWidth = isThumb ? 1 : 2;\n  ctx.stroke();\n\n  // Center dot\n  ctx.beginPath();\n  ctx.arc(c, c, isThumb ? 3 : 5, 0, Math.PI * 2);\n  ctx.fillStyle = '#3b82f6';\n  ctx.fill();\n\n  // Distance text\n  if (!isThumb) {\n    ctx.fillStyle = dist <= tolerance ? (pdfMode ? '#059669' : '#10b981') : '#ef4444';\n    ctx.font = 'bold 14px DM Mono, monospace';\n    ctx.textAlign = 'center';\n    ctx.fillText(dist.toFixed(2) + ' mm från centrum', c, size - 14);\n  }\n}\n\nfunction importVinkelfel() {\n  const raw = document.getElementById('vinkelfelsArea').value.trim();\n  if (!raw) { alert('Inga värden att importera!'); return; }\n  const lines = raw.split(/\\n/);\n  let count = 0;\n  vinkelfelData = {};\n  lines.forEach(line => {\n    const parts = line.trim().split(/[\\t;,\\s]+/);\n    if (parts.length >= 2) {\n      const nr = parseInt(parts[0]);\n      const val = parseFloat(parts[1].replace(',', '.'));\n      if (!isNaN(nr) && !isNaN(val)) {\n        vinkelfelData[nr] = val;\n        count++;\n      }\n    }\n  });\n  document.getElementById('vinkelfelsStatus').textContent = `✅ ${count} Vinkelfel Spridning-värden importerade`;\n  renderHistory();\n}\n\nfunction clearVinkelfel() {\n  vinkelfelData = {};\n  document.getElementById('vinkelfelsArea').value = '';\n  document.getElementById('vinkelfelsStatus').textContent = '';\n  renderHistory();\n}\n\nfunction getVinkelfelsForIndex(i) {\n  return vinkelfelData[i + 1] !== undefined ? vinkelfelData[i + 1] : null;\n}\n\nfunction getState() {\n  return {\n    x: parseFloat(document.getElementById('xInput').value) || 0,\n    y: parseFloat(document.getElementById('yInput').value) || 0,\n    tolerance: 1.2,\n    spread: 1.2,\n  };\n}\n\nfunction liveUpdate() {\n  const { x, y, tolerance, spread } = getState();\n  const dist = Math.sqrt(x * x + y * y);\n  const margin = tolerance - dist;\n  const spreadReach = dist + spread;\n\n  // Update badges\n  document.getElementById('toleranceBadge').textContent = '±' + tolerance.toFixed(1) + ' mm';\n  document.getElementById('spreadBadge').textContent = spread.toFixed(1) + ' mm';\n\n  // Update readout\n  const dv = document.getElementById('distVal');\n  const mv = document.getElementById('margVal');\n  const sv = document.getElementById('spreadReach');\n\n  dv.textContent = dist.toFixed(2) + ' mm';\n  dv.className = 'readout-value ' + (dist <= tolerance ? 'ok' : 'fail');\n\n  mv.textContent = (margin >= 0 ? '+' : '') + margin.toFixed(2) + ' mm';\n  mv.className = 'readout-value ' + (margin >= 0 ? 'ok' : 'fail');\n\n  sv.textContent = spreadReach.toFixed(2) + ' mm';\n  sv.className = 'readout-value spread-val';\n\n  // Status bar\n  const sb = document.getElementById('statusBar');\n  if (dist <= tolerance) {\n    if (spreadReach > tolerance) {\n      sb.textContent = '⚠ OK – men spridningszonen når utanför tolerans';\n      sb.className = 'status-bar warn';\n    } else
