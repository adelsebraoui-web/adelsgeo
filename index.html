{\n      sb.textContent = '✓ OK – Dragaren träffar inom tolerans';\n      sb.className = 'status-bar ok';\n    }\n  } else {\n    sb.textContent = '✕ AVVIKELSE – Dragaren når utanför tolerans ±' + tolerance.toFixed(1) + ' mm';\n    sb.className = 'status-bar fail';\n  }\n\n  drawDiagram(ctx, 640, x, y, tolerance, spread, false);\n}\n\nfunction createThumb(x, y, tol, sp) {\n  const tc = document.createElement('canvas');\n  tc.width = 120; tc.height = 120;\n  drawDiagram(tc.getContext('2d'), 120, x, y, tol, sp, true, false);\n  return tc.toDataURL('image/png');\n}\n\nfunction createPdfImage(x, y, tol, sp) {\n  const tc = document.createElement('canvas');\n  tc.width = 800; tc.height = 800;\n  drawDiagram(tc.getContext('2d'), 800, x, y, tol, sp, false, true);\n  return tc.toDataURL('image/png');\n}\n\nfunction addMeasurement() {\n  const { x, y, tolerance, spread } = getState();\n  const info = document.getElementById('infoInput').value.trim() || '–';\n  const dist = Math.sqrt(x * x + y * y);\n  const margin = tolerance - dist;\n  const spreadReach = dist + spread;\n  const thumb = createThumb(x, y, tolerance, spread);\n  measurements.push({ x, y, dist, margin, spreadReach, tolerance, spread, info, thumb });\n  renderHistory();\n  document.getElementById('infoInput').value = '';\n}\n\nfunction clearInputs() {\n  document.getElementById('xInput').value = '0';\n  document.getElementById('yInput').value = '0';\n  document.getElementById('infoInput').value = '';\n  liveUpdate();\n}\n\nfunction pasteBulk() {\n  let text = document.getElementById('pasteArea').value.trim();\n  if (!text) { alert('Klistra in text i fältet!'); return; }\n\n  text = text.replace(/[^0-9,\\.\\-\\s]/g, ' ');\n  const tokens = text.split(/\\s+/).filter(t => t !== '');\n  const values = tokens.map(t => parseFloat(t.replace(',', '.'))).filter(v => !isNaN(v));\n\n  if (values.length < 56) {\n    alert('Behöver minst 56 värden: 28 X + 28 Y');\n    return;\n  }\n\n  const { tolerance, spread } = getState();\n  measurements = [];\n\n  for (let i = 0; i < 28; i++) {\n    const x = parseFloat(values[i].toFixed(2));\n    const y = parseFloat(values[28 + i].toFixed(2));\n    const dist = Math.sqrt(x * x + y * y);\n    const margin = tolerance - dist;\n    const spreadReach = dist + spread;\n    const thumb = createThumb(x, y, tolerance, spread);\n    measurements.push({ x, y, dist, margin, spreadReach, tolerance, spread, info: '–', thumb });\n  }\n\n  renderHistory();\n  document.getElementById('pasteArea').value = '';\n  alert('✅ 28 punkter importerade');\n\n  const last = measurements[measurements.length - 1];\n  drawDiagram(ctx, 640, last.x, last.y, last.tolerance, last.spread, false);\n}\n\nfunction getStatus(m) {\n  if (m.dist > m.tolerance) return { text: 'Utanför tolerans', cls: 'cell-fail' };\n  return { text: 'OK', cls: 'cell-ok' };\n}\n\nfunction renderHistory() {\n  const tbody = document.querySelector('#historyTable tbody');\n  tbody.innerHTML = '';\n\n  let nOk = 0, nFail = 0;\n\n  measurements.forEach((m, i) => {\n    const { text, cls } = getStatus(m);\n    if (cls === 'cell-ok') nOk++;\n    else nFail++;\n\n    const margTxt = (m.margin >= 0 ? '+' : '') + m.margin.toFixed(2) + ' mm';\n\n    const vf = getVinkelfelsForIndex(i);\n    const vfTxt = vf !== null ? vf.toFixed(1) + '°' : '–';\n    const vfColor = vf !== null ? (vf > 2 ? 'var(--fail)' : vf > 1.5 ? 'var(--warn)' : 'var(--ok)') : 'var(--muted)';\n\n    const tr = document.createElement('tr');\n    tr.innerHTML = `\n      <td>${i + 1}</td>\n      <td>${m.x >= 0 ? '+' : ''}${m.x.toFixed(2)} mm</td>\n      <td>${m.y >= 0 ? '+' : ''}${m.y.toFixed(2)} mm</td>\n      <td>${m.dist.toFixed(2)} mm</td>\n      <td>${margTxt}</td>\n      <td style=\"color: var(--spread);\">${m.spreadReach.toFixed(2)} mm</td>\n      <td style=\"color: ${vfColor}; font-weight:500;\">${vfTxt}</td>\n      <td><img src=\"${m.thumb}\" class=\"mini-img\" onclick=\"showModal(${i})\"></td>\n      <td style=\"color: var(--muted); font-size: 11px;\">${m.info}</td>\n      <td><span class=\"status-cell ${cls}\">${text}</span></td>\n    `;\n    tbody.appendChild(tr);\n  });\n\n  // Summary\n  const chips = document.getElementById('summaryChips');\n  chips.innerHTML = `\n    <span class=\"chip chip-total\">${measurements.length} totalt</span>\n    ${nOk > 0 ? `<span class=\"chip chip-ok\">✓ ${nOk} OK</span>` : ''}\n    ${nFail > 0 ? `<span class=\"chip chip-fail\">✕ ${nFail} utanför tolerans</span>` : ''}\n  `;\n}\n\nfunction showModal(i) {\n  const m = measurements[i];\n  const mc = document.getElementById('modalCanvas');\n  drawDiagram(mc.getContext('2d'), 500, m.x, m.y, m.tolerance, m.spread, false);\n  document.getElementById('modalTitle').textContent = `Spindel #${i + 1} — X: ${m.x >= 0 ? '+' : ''}${m.x.toFixed(2)} mm  Y: ${m.y >= 0 ? '+' : ''}${m.y.toFixed(2)} mm`;\n  document.getElementById('modal').style.display = 'flex';\n}\n\nfunction closeModal() {\n  document.getElementById('modal').style.display = 'none';\n}\n\nfunction clearAll() {\n  if (confirm('Rensa alla mätpunkter?')) {\n    measurements = [];\n    renderHistory();\n    liveUpdate();\n  }\n}\n\nasync function exportToPDF() {\n  const { jsPDF } = window.jspdf;\n  const doc = new jsPDF('p', 'mm', 'a4');\n  const title = document.getElementById('pdfTitle').value.trim() || 'Dragare Avvikelserapport';\n  const pageW = 210;\n  const pageH = 297;\n  const marginX = 14;\n  const headerH = 26;\n  const itemsPerPage = 3;\n  const today = new Date().toLocaleDateString('sv-SE');\n\n  const imgSize = 72;\n  const imgX = pageW - marginX - imgSize;\n  const textColW = imgX - marginX - 6;\n\n  const bodyTop = headerH + 6;\n  const bodyH = pageH - bodyTop - 8;\n  const rowH = bodyH / itemsPerPage;\n\n  function drawPageHeader(pageIdx) {\n    doc.setFillColor(15, 23, 42);\n    doc.rect(0, 0, pageW, headerH, 'F');\n    doc.setTextColor(255, 255, 255);\n    doc.setFont('helvetica', 'bold');\n    doc.setFontSize(13);\n    doc.text(title, marginX, 12);\n    doc.setFont('helvetica', 'normal');\n    doc.setFontSize(8);\n    doc.text(`${today}  |  Tolerans: ±1.2 mm  |  Spread: 1.2 mm`, pageW - marginX, 12, { align: 'right' });\n    doc.setFontSize(8);\n    doc.setTextColor(148, 163, 184);\n    doc.text(`Sida ${pageIdx + 1}`, marginX, 21);\n    doc.setTextColor(0);\n  }\n\n  // ── PAGE 1: Summary with vinkelfel bar chart ──\n  drawPageHeader(0);\n\n  // Stats\n  let nOk = 0, nFail = 0, maxDist = 0, totalDist = 0, maxSpread = 0;\n  measurements.forEach(m => {\n    if (m.dist <= m.tolerance) nOk++; else nFail++;\n    if (m.dist > maxDist) maxDist = m.dist;\n    totalDist += m.dist;\n    if (m.spreadReach > maxSpread) maxSpread = m.spreadReach;\n  });\n  const meanDist = measurements.length ? totalDist / measurements.length : 0;\n  const pct = measurements.length ? Math.round(nOk / measurements.length * 100) : 0;\n\n  let y0 = bodyTop + 6;\n\n  // RESULTATÖVERSIKT\n  doc.setFont('helvetica', 'bold');\n  doc.setFontSize(8);\n  doc.setTextColor(80, 80, 80);\n  doc.text('RESULTATÖVERSIKT', marginX, y0);\n  y0 += 7;\n\n  // Chips\n  const chips = [\n    { label: `${measurements.length} totalt`, bg: [230,230,235], fg: [60,60,70] },\n    { label: `${nOk} OK`, bg: [209,250,229], fg: [6,95,70] },\n    { label: `${nFail} utanför tolerans`, bg: nFail > 0 ? [254,226,226] : [230,230,235], fg: nFail > 0 ? [153,27,27] : [100,100,110] },\n  ];\n  let cx = marginX;\n  chips.forEach(chip => {\n    const tw = doc.getTextWidth(chip.label) + 8;\n    doc.setFillColor(...chip.bg);\n    doc.roundedRect(cx, y0, tw, 7, 1.5, 1.5, 'F');\n    doc.setFont('helvetica', 'bold');\n    doc.setFontSize(8);\n    doc.setTextColor(...chip.fg);\n    doc.text(chip.label, cx + tw/2, y0 + 4.8, { align: 'center' });\n    cx += tw + 4;\n  });\n  y0 += 12;\n\n  // KPI row\n  const kpis = [\n    { label: 'Godkänd', value: pct + '%', color: pct >= 80 ? [6,95,70] : [153,27,27] },\n    { label: 'Max avstånd', value: maxDist.toFixed(2) + ' mm', color: [15,23,42] },\n    { label: 'Medel avst.', value: meanDist.toFixed(2) + ' mm', color: [15,23,42] },\n    { label: 'Max spread når', value: maxSpread.toFixed(2) + ' mm', color: [120,60,180] },\n  ];\n  const kpiW = (pageW - marginX * 2) / kpis.length;\n  doc.setFillColor(245, 247, 250);\n  doc.roundedRect(marginX, y0, pageW - marginX*2, 18, 2, 2, 'F');\n  kpis.forEach((k, i) => {\n    const kx = marginX + i * kpiW + kpiW/2;\n    doc.setFont('helvetica', 'normal');\n    doc.setFontSize(7);\n    doc.setTextColor(120, 120, 130);\n    doc.text(k.label, kx, y0 + 5, { align: 'center' });\n    doc.setFont('helvetica', 'bold');\n    doc.setFontSize(10);\n    doc.setTextColor(...k.color);\n    doc.text(k.value, kx, y0 + 13, { align: 'center' });\n  });\n  y0 += 24;\n\n  // ── Shared chart constants ──\n  const chartLeft = marginX;\n  const tolerance = 1.2;\n  const barH = 2.8;\n  const barGap = 0.6;\n  const numBars = measurements.length || 28;\n  const barAreaW = 68;\n  const labelW = 9;\n  const barStartX = chartLeft + labelW;\n  const chartBlockH = numBars * (barH + barGap) + 8; // height of one bar chart\n\n  // ── LEFT COLUMN: Avstånd chart + Vinkelfel chart stacked ──\n  const leftColW = barAreaW + labelW + 4;\n  const chartTop = y0;\n\n  // Section background for avstånd\n  doc.setFillColor(248, 249, 252);\n  doc.roundedRect(chartLeft - 2, chartTop - 3, leftColW + 4, chartBlockH + 10, 2, 2, 'F');\n\n  doc.setFont('helvetica', 'bold');\n  doc.setFontSize(6.5);\n  doc.setTextColor(100, 110, 130);\n  doc.text('AVSTÅND PER SPINDEL (mm)', chartLeft, chartTop);\n\n  const maxDist2 = Math.max(tolerance * 1.5, maxDist * 1.05);\n  const tolX = barStartX + (tolerance / maxDist2) * barAreaW;\n\n  measurements.forEach((m, i) => {\n    const by = chartTop + 5 + i * (barH + barGap);\n    const barLen = Math.min(m.dist / maxDist2 * barAreaW, barAreaW);\n    const isOk = m.dist <= m.tolerance;\n    doc.setFont('helvetica', 'normal');\n    doc.setFontSize(5);\n    doc.setTextColor(110, 120, 135);\n    doc.text(String(i + 1), chartLeft + labelW - 1, by + barH - 0.3, { align: 'right' });\n    doc.setFillColor(...(isOk ? [34,197,94] : [239,68,68]));\n    doc.rect(barStartX, by, Math.max(barLen, 0.5), barH, 'F');\n  });\n\n  // Tolerance dashed line\n  doc.setDrawColor(200, 50, 50);\n  doc.setLineWidth(0.35);\n  doc.setLineDash([1.2, 0.8]);\n  doc.line(tolX, chartTop + 3.5, tolX, chartTop + 5 + numBars * (barH + barGap) - 1);\n  doc.setLineDash([]);\n  doc.setFontSize(4.5);\n  doc.setTextColor(180, 40, 40);\n  doc.text('±1.2', tolX + 0.5, chartTop + 3);\n\n  // ── VINKELFEL chart — directly below avstånd chart ──\n  const vfKeys = Object.keys(vinkelfelData).map(Number).sort((a,b)=>a-b);\n  if (vfKeys.length > 0) {\n    const vfVals = vfKeys.map(k => vinkelfelData[k]);\n    const minVF = Math.min(...vfVals);\n    const maxVF = Math.max(...vfVals);\n    const minIdx = vfKeys[vfVals.indexOf(minVF)];\n    const maxIdx = vfKeys[vfVals.indexOf(maxVF)];\n    const maxBarVF = Math.max(maxVF * 1.1, 1);\n\n    const vfTop = chartTop + chartBlockH + 6;\n\n    // Section background for vinkelfel\n    doc.setFillColor(248, 249, 252);\n    doc.roundedRect(chartLeft - 2, vfTop - 3, leftColW + 4, chartBlockH + 10, 2, 2, 'F');\n\n    doc.setFont('helvetica', 'bold');\n    doc.setFontSize(6.5);\n    doc.setTextColor(100, 110, 130);\n    doc.text('VINKELFEL SPRIDNING PER SPINDEL (°)', chartLeft, vfTop);\n\n    vfKeys.forEach((spindel) => {\n      const val = vinkelfelData[spindel];\n      const by = vfTop + 5 + (spindel - 1) * (barH + barGap);\n      const barLen = Math.min(val / maxBarVF * barAreaW, barAreaW);\n      const isMin = spindel === minIdx;\n      const isMax = spindel === maxIdx;\n      const color = isMax ? [239,68,68] : isMin ? [34,197,94] : [59,130,246];\n      doc.setFont('helvetica', 'normal');\n      doc.setFontSize(5);\n      doc.setTextColor(110, 120, 135);\n      doc.text(String(spindel), chartLeft + labelW - 1, by + barH - 0.3, { align: 'right' });\n      doc.setFillColor(...color);\n      doc.rect(barStartX, by, Math.max(barLen, 0.5), barH, 'F');\n    });\n\n    // Min/max pill labels\n    const pillY = vfTop + 5 + numBars * (barH + barGap) + 1;\n    // Green pill - min\n    doc.setFillColor(220, 252, 231);\n    doc.roundedRect(chartLeft, pillY, 36, 5.5, 1, 1, 'F');\n    doc.setFontSize(5);\n    doc.setTextColor(6, 95, 70);\n    doc.text(`Min: Spindel ${minIdx}  (${minVF.toFixed(1)}°)`, chartLeft + 18, pillY + 3.6, { align: 'center' });\n    // Red pill - max\n    doc.setFillColor(254, 226, 226);\n    doc.roundedRect(chartLeft + 38, pillY, 36, 5.5, 1, 1, 'F');\n    doc.setFontSize(5);\n    doc.setTextColor(153, 27, 27);\n    doc.text(`Max: Spindel ${maxIdx}  (${maxVF.toFixed(1)}°)`, chartLeft + 56, pillY + 3.6, { align: 'center' });\n  }\n\n  // ── RIGHT COLUMN: Donut chart + legend ──\n  const rightColX = chartLeft + leftColW + 14;\n  const donutSize = 52;\n  const donutX = rightColX + 4;\n  const donutY = chartTop + 2;\n\n  const total = nOk + nFail;\n  if (total > 0) {\n    const okAngle = (nOk / total) * Math.PI * 2;\n    const pc = document.createElement('canvas');\n    pc.width = 300; pc.height = 300;\n    const px2 = pc.getContext('2d');\n    const pr = 130;\n    const pcx = 150, pcy = 150;\n    px2.beginPath();\n    px2.moveTo(pcx, pcy);\n    px2.arc(pcx, pcy, pr, -Math.PI/2, -Math.PI/2 + okAngle);\n    px2.closePath();\n    px2.fillStyle = '#22c55e';\n    px2.fill();\n    if (nFail > 0) {\n      px2.beginPath();\n      px2.moveTo(pcx, pcy);\n      px2.arc(pcx, pcy, pr, -Math.PI/2 + okAngle, -Math.PI/2 + Math.PI*2);\n      px2.closePath();\n      px2.fillStyle = '#ef4444';\n      px2.fill();\n    }\n    px2.beginPath();\n    px2.arc(pcx, pcy, pr * 0.54, 0, Math.PI * 2);\n    px2.fillStyle = '#f8f9fc';\n    px2.fill();\n    px2.fillStyle = '#1e293b';\n    px2.font = 'bold 52px Arial';\n    px2.textAlign = 'center';\n    px2.fillText(pct + '%', pcx, pcy - 4);\n    px2.font = '22px Arial';\n    px2.fillStyle = '#64748b';\n    px2.fillText('OK', pcx, pcy + 22);\n    try { doc.addImage(pc.toDataURL('image/png'), 'PNG', donutX, donutY, donutSize, donutSize); } catch(e) {}\n  }\n\n  // Legend below donut\n  const legY = donutY + donutSize + 5;\n  const legLineH = 7;\n  const legendItems = [\n    { color: [34,197,94], bg: [220,252,231], label: `${nOk} inom tolerans` },\n    { color: [239,68,68], bg: [254,226,226], label: `${nFail} utanför tolerans` },\n  ];\n  legendItems.forEach((item, i) => {\n    const ly = legY + i * legLineH;\n    doc.setFillColor(...item.bg);\n    doc.roundedRect(donutX, ly, 4, 4, 0.5, 0.5, 'F');\n    doc.setFillColor(...item.color);\n    doc.circle(donutX + 2, ly + 2, 1.5, 'F');\n    doc.setFont('helvetica', 'normal');\n    doc.setFontSize(6.5);\n    doc.setTextColor(50, 60, 75);\n    doc.text(item.label, donutX + 6, ly + 3.2);\n  });\n\n  // ── Pages 2+: one spindel per 3 per page ──\n  for (let i = 0; i < measurements.length; i++) {\n    const posOnPage = i % itemsPerPage;\n    const pageIdx = Math.floor(i / itemsPerPage) + 1; // +1 because page 0 is summary\n    const m = measurements[i];\n\n    if (posOnPage === 0) {\n      doc.addPage();\n      drawPageHeader(pageIdx);\n    }\n\n    const rowTop = bodyTop + posOnPage * rowH;\n    const textY = rowTop + 9;\n\n    if (posOnPage > 0) {\n      doc.setDrawColor(220, 220, 220);\n      doc.setLineWidth(0.3);\n      doc.line(marginX, rowTop - 1, pageW - marginX, rowTop - 1);\n    }\n\n    // Heading: Spindel instead of Mätpunkt\n    doc.setFont('helvetica', 'bold');\n    doc.setFontSize(11);\n    doc.setTextColor(0);\n    doc.text(`Spindel ${i + 1}`, marginX, textY);\n\n    doc.setFont('helvetica', 'normal');\n    doc.setFontSize(9);\n    doc.text(`X: ${m.x >= 0 ? '+' : ''}${m.x.toFixed(2)} mm   Y: ${m.y >= 0 ? '+' : ''}${m.y.toFixed(2)} mm`, marginX, textY + 8);\n    doc.text(`Avstånd från centrum: ${m.dist.toFixed(2)} mm    Marginal: ${(m.margin >= 0 ? '+' : '')}${m.margin.toFixed(2)} mm`, marginX, textY + 16);\n    doc.text(`Spridning når: ${m.spreadReach.toFixed(2)} mm    Kommentar: ${m.info}`, marginX, textY + 24);\n\n    // Vinkelfel spridare row\n    const vf = getVinkelfelsForIndex(i);\n    const vfStr = vf !== null ? vf.toFixed(1) + '°' : '–';\n    doc.setFont('helvetica', 'normal');\n    doc.setFontSize(9);\n    doc.setTextColor(vf !== null ? (vf > 2 ? 153 : 0) : 120, 0, 0);\n    doc.setTextColor(60, 60, 60);\n    doc.text(`Vinkelfel Spridning: ${vfStr}`, marginX, textY + 32);\n    doc.setTextColor(0);\n\n    // Status badge\n    const { text, cls } = getStatus(m);\n    if (cls === 'cell-ok') {\n      doc.setFillColor(209, 250, 229);\n      doc.setTextColor(6, 95, 70);\n    } else {\n      doc.setFillColor(254, 226, 226);\n      doc.setTextColor(153, 27, 27);\n    }\n    doc.roundedRect(marginX, textY + 36, 28, 8, 1.5, 1.5, 'F');\n    doc.setFont('helvetica', 'bold');\n    doc.setFontSize(8);\n    doc.text(cls === 'cell-ok' ? 'OK' : 'AVVIKELSE', marginX + 14, textY + 41.5, { align: 'center' });\n    doc.setTextColor(0);\n\n    const pdfImg = createPdfImage(m.x, m.y, m.tolerance, m.spread);\n    const imgY = rowTop + (rowH - imgSize) / 2;\n    try {\n      doc.addImage(pdfImg, 'PNG', imgX, imgY, imgSize, imgSize);\n    } catch(e) {}\n    doc.setDrawColor(200, 200, 200);\n    doc.setLineWidth(0.25);\n    doc.rect(imgX, imgY, imgSize, imgSize);\n  }\n\n  doc.save(`Avvikelserapport_${new Date().toISOString().slice(0, 10)}.pdf`);\n}\n\n// Init\nwindow.onload = () => liveUpdate();\n<\/script>\n</body>\n</html>\n"}];
        
        function check() {
            if(document.getElementById('p').value.toLowerCase() === 'geo') {
                document.getElementById('login').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                document.getElementById('nav').style.display = 'flex';
                init();
            }
        }

        function init() {
            const nav = document.getElementById('nav');
            const views = document.getElementById('views');
            
            data.forEach((tab, i) => {
                // Skapa knapp
                const btn = document.createElement('div');
                btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
                btn.id = 'b' + i;
                btn.innerText = tab.name;
                btn.onclick = () => show(i);
                nav.appendChild(btn);

                // Skapa iframe för att isolera flikens kod
                const frame = document.createElement('iframe');
                frame.id = 'v' + i;
                if(i === 0) frame.className = 'active';
                views.appendChild(frame);
                
                // Skriv koden till iframen
                const doc = frame.contentWindow.document;
                doc.open();
                doc.write(tab.content);
                doc.close();
            });
        }

        function show(idx) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('iframe').forEach(v => v.classList.remove('active'));
            document.getElementById('b' + idx).classList.add('active');
            document.getElementById('v' + idx).classList.add('active');
        }
    </script>
